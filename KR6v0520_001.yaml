危石來遊及清和逍遙駐輕屐禮塔瞻法雲看竹入叢碧鴨腳搖空陰禽語生晝寂殿隨龍象墮樓因藥王闢勝覽喜自今陳迹感猶昔憑襟共舒嘯高詠遂移夕湖環一角明月吐四更白銷夏許再來吟風布瑤席戴廷熺鸝亭愛山期山遊十日佳招預維夏景清和好山僧所居雅集同竹溪入座聰殊與城郭環晝陰林巒漾晴絮畫境目遠收樓成勝全踞盡拓湖面窗茶香石泉濾米汁酡客顏伊蒲且飽飫陰濃緑染衣黃鳥風前語隱隱答吟聲幽修竹深處合并興偶乘良會時易去阿師句可參少陵詩有據他時待月來水明額新署雨霽登水明樓訪雲巢上人不值新安汪聖揚石儕未識水明樓取斯集中見老樹繪陰森遙峰寫蔥蒨湖漾白千層城圍青一線禪榻作吟壇茗碗供酣戰恨我來何遲不獲陪歡宴久雨快初晴軒窗開面面登眺一憑闌恍若披詩卷藥香砭俗腸爐煙妙清篆餘生欲結緣蓮社吾師羡遠公出未歸賦此以為券新霽同楊崑臺雲巢水明樓餞柳潔夫北上邵晉之敘階我家繡雲樓日夕翠色浮蔚蓊西南瞰視辨晴雨最近一嶺森青楓此間磴道回轉處知有調御棲琳宮芒鞋前度豈陳迹瘦藤重策尚過從夜來愁淅瀝曉起喜瞳朧山徑足側泥滑滑山樓角滉波溶溶羣山萬狀衝樓起明滅逼漏雲煙中飛泉練淨眩銀海古塔膚剝擎玉蓉間鷗露影沙際落長堤半見晴何虹總之衆夏釀深緑倚欄自可明方曈復有楊夫子乘興撫焦桐梅花疊三弄恰似和中峰千年爪髮餘香在竹林習習生清風新詩賦羣賢伊蒲供已公銜杯發興破寥廓山水能教結習空攜歸貯景繡雲臥底用八埏周九嵕今日良會具歡樂溥也促我折柳何匆匆外麓山望湖上諸山錢塘范肇新容安長廊午風涼夏木羅空青林深斂積雨日薄含疏櫺山顛古城堞依依列遙屏竹外漾湖水奩鏡初出硎衆峰翠可拭俯視煙冥冥忽憶去年時蜀道愁淋鈴掉頭返茅茨得與勝侶并吟詩向白社結夏尋禪扃領略靜中趣擺脫世上形在家貧亦樂豈必腰懸釘徘徊日云夕談笑醉復醒明朝酒人約泛艇湖上亭南屏篆玉讓山雨止整遊屐清思遂紛紛微風拂林杪疾卷陰壑雲興會固無適登陟從所欣修廊瞻遐矚物各呈殷勤重湖界若罫山輝鎔氛氳羡彼衆峰影遍繞荷香熏天空愜晴望連袂忘劇分側行淨莎圃示我瘞髮墳各循城坳歸喧寂兩不聞回寺緑沈寺啞啞叫鴉羣愛松房溢中璇禪師少峰精齋皆其裔也憩愛松山房贈三峰上人釋明奇幾度尋真到水潯招提轉抱數峰深門前竹浪雲連屐石上花濤雨點襟虎卧松龕參慧旨月來笏杖問禪心頭陀指引煙生處只在竺峰最上岑秋夜宿愛松山房錢塘鄭江筠谷竹涼月在水讀書閉秋寺露下寒空高清景娛無寐幽人詠招隱逍遙發遙思徙倚漏方沈衣裳溼嵐翠又讀書愛松觀暴雨雲壓長天暗萬峰秋聲遠近吼羣松雷霆廢寺轟妖木風雨空潭起毒龍兩鏡湖光埋密霧一簾花影度疏鐘輕鷗明滅隨煙艇霽後憑欄翠幾重孤雲房在殿東愛松分支無文敬禪師錢塘魏明府諱㟶解組後長寓孤雲與維新西銘二僧交好後因魏公修縣志寺中冒將維新西銘刊入志云國朝某年僧維新西銘重修雲居實無其事又寺額雲居二字係趙松雪嫡筆被魏公易去近日孤雲後裔不振已敗廢矣按孤雲盛時曾賣木屐故有雲居木屐之名上方菴係雲居下院亦愛松分支春堂茂禪師上方在一滴泉之下仇兆鼇讀書之所今廢南溟房在天王殿東向有半堂羅漢佛壁今廢無念思和尚聽松樓詩德興夏原吉維哲大雅久不作鈞天寂無音繁聲急響徒沸耳淳風古意誰存心南溟道人獨爾得真趣拂卻哇淫掃塵慮縛茅直向吳山巔繞屋森森種松樹天風時自天際來松聲畢發真奇哉清如孤鶴唳碧落驚如萬馬奔黃埃又如瑤臺三千仙子朝帝闕環佩珊珊步明月瓊林十八學士登瀛洲軒蓋翩翩振金節南溟此際誰與俱鉤簾晏坐心于于聲來松間聽在我我心還似松聲虛不抱焦尾木不弄柯亭竹惟聽髯龍吟歲寒更奇獨愧豫塵俗走未休耳邊安得辭喧啾南溟南溟為我留半榻尚期後日重來遊贈南宗上人歸有序錢塘夏原吉永樂初豫奉命在吳時南宗上人攜看松樓詩謁豫索題忙迫中嘗為綴數句于卷末迄今二十餘年偶會于燕都晏館語舊未幾又復告歸蹤迹萍逢良用悵懷姑作五十六字以送之二十年前浙水遊題詩曾上聽松樓四簷窗几清人骨萬瓦雲煙駐筆留車轍祇慚同泛梗塵心徒切仰虛舟如今又向燕山別舊日松風得在否南溟上人聽松樓黃澤南溟惠上人深居絶塵想鋤雲種青松松隨白鶴長禪心何悠悠開樓坐間厰微風天上來木末動清響初疑琴聲絃上起非角非商亦非徵又疑山陽鐵笛聲嗚嗚雙蛟夜泣寒潭水清如玄都仙人騎鸞朝玉京疾如長江風帆日走二千里疾而徐廣庭涼夜吹笙竽芭蕉卷緑雨聲碎池荷瀉露驚遊魚疏而數九皋月冷聞孤鶴蕭蕭黃葉階下飛簌簌風泉澗邊落陰晴風雨聲隨變老衲聽之渾不厭俗耳昏聲豈解聞塵眸芒昧何由見騑騑四牡皇華使公餘偶向名山去松下逢人問所之相邀直到雲深處琳宮寶剎何崔巍高樓百仞雲中開徂徠秀色滿窗戶虯枝戛戛鳴春雷須臾坐定風轉息萬籟無聲山寂寂上人索我聽松詩醉墨淋漓掃樓壁詩成相對已忘言松月涓涓松露滴白雲亭在山門東嶺柳潔夫讀書山中同僧崙山新建嶺上多白雲額李文靜書對聯豁開心地渾無我收拾山亭好望湖柳溥題暝色西來千嶂雨練光東起一江潮通淵題山亭黃萬鈞觀日嶺頭亭子接嶙峋搆自雲居外麓人野徑頓呈新色相名山不改舊精神東西一攬江湖在高下周環樹石鄰廢殿卻愁荒蘚合布金長者待良因同作戴廷熺嶺脊高臨雉堞邊一亭新搆往來便霏微樹靄樓簷角斷續江雲落眼前周隱佛廬清磬出細分樵徑野花妍月生坐久忘歸去讀畫聽詩不礙禪蘇白竹泉古寺山城絶市囂翼然簷角露巖椒看雲客過耽休息攜杖人來破寂寥石上拂苔題好句風前搔首聽寒潮新亭景物堪留戀不負詩瓢與酒瓢楊式玉元白雉堞成屏疊石遮高亭危立倚煙霞亂雲古寺齋鐘動一徑清波夕照斜江色倒翻天影碧湖光隔斷市聲譁我來欲共山僧咏尚有深林未落花常住祭祀法産計田三十八畝二分一釐一毫又續置田畝分釐通計四十畝分釐坐落仁和縣五行鎮王家橋二都八圖今入似蘭一圖髮字號內俱係素菴朴用彰紳兩禪師置每年正月元旦上殿供菜花果連中峰殿六桌祝聖之燭大小共四斤燒餅百枚分給上殿衆僧寺長維那雙股撞鐘擂鼓各一股二月朔日送香悉照元旦辦事清明上中峰殿祠堂供菜三桌銀錠六千黃紙三角七月望冬至節悉照上行事二月十九日禮觀音懺一永日香燭供給輪流值事四月八日沐佛早上喫糖豆禮懺一日悉照二月十九辦向來冬至日出門收租歸山分給牆頭米按牆之多寡分給一切完糧納課衙門公費俱在此産支用總屬不敷衆僧口糧所賸無幾矣內麓房普同塔一座在留下欽賢十四圖黎字號內計五畝外麓房普同塔一座字號同前計十八畝分左侯廟在城北一圖明季西麓所分普同塔在內瘞素菴朴禪師天竺墳一塊在中天竺之上計十弓內麓祭祀集慶墳一塊在普福嶺計外麓祭祀天寧塔一座內瘞維揚天寧寺具如和尚諱明奇係外麓實懿付法師也計地五分六釐一毫字號同前雲居寺荒土山三十五畝六分八釐九毫二絲石山七十二畝每年完糧一兩二錢二分閏年加二釐八分計開常住法器大銅鐘一口約重二千餘斤係文曉同徒道清于宏治十六年十月初十日募鑄銅磬兩口重十餘斤大木魚一個大鐵雲板一塊鐵磬一口瑣碎等物常住另有交單不及細贅金文元海昌人也係崙山之族姪長齋繡佛終身不娶住外麓三十餘年如一日閉戶焚修有金老佛之名助刊梅花百詠二卷考田副使西湖遊覽志謂雲居聖水本二寺也明洪武二十四年始合為一賜今額此語則是其謂雲居菴宋元祐間僧了元建聖水寺元元貞間僧明本建尚有未確查咸淳臨安志載聖水菴本名靈智院在七寶山巫泉能療民疾嘉定二年改稱聖水則不始于元也又雲居菴萬曆錢塘縣志載稱唐懿宗年間建與現在寺志合似雲居並不始于宋也惟遊覽志成于嘉靖而聶氏錢塘志成于萬曆彼此互異不知何據姑俟再考艮園汪氏附識
