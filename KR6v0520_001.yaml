body:
  text: 寂湛同明倫原輯通淵同實懿重纂形勝吳山又名七寶山突起會城東南隅綿亘數里邐迤而西蹊徑幽邃峰勢秀削憑虛卻立左吞江光右飲湖緑風帆隱現於林隙遊舫蕩漾於巖坳前則雉堞橫雲縹眇如帶後則嶺如屏幛青圍翠繞蓋奧如而具曠如之觀不獨為茲山之冠即兩峰三竺未便過之其天設地成之勝有足稱焉志形勝山在郡城內七寶山西南隅左江右湖面坤負艮東則橐駝嶺下抵清屏山西則鐵崖嶺北則紫芳嶺下抵郭璞井南則崇墉百尺列若屏垣幽深靜謐迥隔囂氛誠勝地也鳳凰山脈來自天目為郡主山昔人所稱龍飛鳳舞到錢塘者城踞鳳凰左翼城內諸山緣祀泰伯伍員總謂之吳山雲居山在杭州城西南隅面聖湖倚楓林頗稱佳境杭州府志三台石位置端拱儼然列宿三台石記荊門胡作柄三台石為雲居寺十景之一訪之僧輒指寺西南隅謂石在山巔路險仄皆聞其名未嘗至其地也夫泰華嵩衡之高人往往躡層巒臨絶巘矧跬步之前數仞之勢僧乃憚于遊乎遂獨步寺門外厯磴十餘級稍折而西覓徑而往是時午日當天清風拂地不數百步即見所謂三台石者石斜對上方菴後枕女墻左挾西湖右瞰錢塘江如劍戟列如虎豹伏高下其形其數有六昔之人蓋嘗徙倚攀摩錫以嘉名厥後繼踵者少徒付之荒煙蔓草厯歲經年曾無有過而問焉者豈非石之不幸歟雖然天下事亦何常之有不有余今日之聞其名即欣然造其地不假賓朋之從不待杯酒之攜相與惝恍流連而不能已已耶又豈非斯石之重幸與獨是三台者斗魁之下有六星天下治其象平所謂泰階平是也世人且以比三公之爵茲石何以名耶星宿之精下而為禽為獸隕而為石豈山三台之星有時隕耶抑其精之所流耶以其數六兩兩相對象於台星故名之耶求其故不得乃憑石而寐忽有謂豫者曰子不記五雲多處是三台之句耶名石之意是使人觸於目感於懷而不禁望闕懷恩之思也豫遂恍然而寤見有人立麓下是豈夢中語豫者耶諦視之則上方菴之樹影著墻耳渴甚掬水飲之若飽因思明月之下攜斗酒面石而飲豈不對影成九人耶遂與石訂再來之盟踏夕陽而歸寺三台石釋實懿雲巢三台異頑石間氣結巑岏峰峰距咫尺朵朵空中攢象緯繞山靈列宿曠奇觀秀削高城上清風落暮寒江櫺石高數丈屹立城隅洞穴玲瓏瞰望平沙極浦有如窗牖江櫺之名以此龜石規圓二丈餘色緇而潤皴以細紋斷續如卦形首昂背俯狀甚肖朝陽洞在嶺上吸受朝暉通明晃耀故名朝陽呂字巖在東嶺之陽立石數仞洞穴雙朗上小下大有似呂石字聖水巖在紫芳嶺半有巉石突兀高大約四五丈勢若垂雲下有潴水停泓冬夏不耗今則為崩土所淤矣三佛泉昔中峰和尚闢地夜見草莽中碧色光起得古井浚之獲三石佛首相既莊嚴泉亦甘冽元巴西鄧文肅有序銘見杭州府志三佛泉記銘鄧文原三泉在七寶山雲居菴沙門指月所浚也菴始湫溢延祐丁巳擴而大之夷高就深出土盈尺得古井甘而易涸歲甲子復深之去木與石復得眢井甓甃堅完距地餘四尋寒泉芳冽汲用不竭越有神異見石佛首三諸相具足於是續以貞珉塗以黃金諸比邱衆恭敬圍繞歎未曾有已而鄧艾文原為之銘曰我觀大地積水所載孰疏鑿是太虛無外掘地及泉視之縈帶如履冥途破諸障礙其源淵谷其瀉湍瀨不止不流以與井會瑞相現前示我三昧彼壞者石實相不壞是實相改偏河沙界以一勺甘除世濁愛是相是水無在不在我作銘詩以驚盲瞶一滴泉在山之東石上有蘇軾錢協江公著柳雍元祐六年三月七日記又東坡刻詩于旁今模糊不能識題一滴泉蘇軾東坡一菴高隱古城邊半是山林半市廛月色透窗霜滿屋卧聞宰相去朝天釋德一達方石泉分聖水一滴似曹溪味得高僧別名從學士題苔痕浸墨潤雲影拂巖低倚竹長吟罷城烏月下啼釋實懿雲巢為覓源頭叩竹扉深林空翠溼人衣石含米芾三生秀泉落曹溪一滴微掬到掌心清更徹嘗來舌本味還稀間尋學士留題處斷壁荒涼煙雨霏燒香洞三字勒石洞側疑古多燒香於此楓嶺高峰突兀老楓百株森然圍繞每一登眺則闔郡形勝俱在睫下建置夫把茅蓋頭便開淨域雙樹説法即成叢林則地因人著不信然耶溯唐咸通間道膺禪師杯渡西江錫飛東越入七寶山愛其峰巒深秀林木茂密結菴禪誦顏曰雲居洎宋佛印迄今中峰選佛場開宗風益扇易菴為寺金碧輝映於巖壑間緇流問道勝侶題襟厯數百年無不知有雲居之勝者然則夷茀而基撥雲而廬締造之始其可略而不著使後之人無所考哉志建置唐咸通中禪師道膺雲遊來杭愛此山麓之勝就樹結菴顏曰雲居蓋參學于豫章雲居山仍以二字名菴志不忘也宋元祐間佛印禪師見聖水巖林幽勝遠隔塵囂乃安禪以聖水名其寺元初兵燹隳廢住山指月禪師謀新之躬請普應國師中峰和尚討尋舊迹芟去荒蕪重建前後殿宇方丈僧寮廊廡畢具大衆雲集復成叢林名與五山十剎並列趙孟俯手書雲居匾額及淨土詩迄今碑勒猶存明洪武二十四年奉旨歸併天下寺院浙江布政使王鈍遂將聖水寺併入雲居菴奏聞賜額雲居聖水禪寺嗣後素菴朴禪師始建觀音萬佛等閣成化丁亥燬于火素菴徒文紳首倡鳩工四方樂助復建大雄寶殿琳紺莊嚴百廢具舉有逾昔觀落成於丙申之秋宏治乙卯比邱道孜募緣重修海鹽沈衡有記邑人沈源篆道孜立石寺牆周數百丈以近閫司署今改為學院衙門厯任都師惑形家言禁不使築康熙四十三年巡撫張泰交知府張恕可始斷令寺僧曙升心學復築之鹽驛道高熊徵為之記刑部侍郎高其佩跋並勒于石寺自宏治至今幾三百載殿堂寮廡日就荒落其存者具書於左常住祭祀法産並附焉山門一楹坍廢已久乾隆乙酉雲巢募修天王殿三楹高三丈七尺現大莊嚴額瀋陽李之粹書對聯禪心正與天心合國法幽將佛法扶佛生西域祥光現於周朝法教東流金像夢於漢帝禪堂三楹高二丈一尺齋樓三楹俱在天王殿之東今廢中峰塔院三楹內瘞中峰祖師爪髮舍利有覺照堂額雲間徐朗書乾隆己巳外麓崙山修對聯天目同源舍利放光照法塔雲居分派淨土留偈鎮名山幻住十四世孫實懿題遊雲居寺禮中峰和尚髮塔厲鶚太鴻幽磴無人行露蘚緑相待倚山為女牆春物見爽嵦叢深鳥嚶嚶沙崩石磊磊長廊據寺勝酌泉散憂痗恭聞大導師巖畔藏落彩唐淨業法師塔銘高宗忌辰方階落彩作禮向間房真風故常在選樹坐移陰仰看雲意改遊雲忽東南遐心渺江海同作上虞石文真石春雨回荒姿餘寒晴復陰逶迤步石徑禪室來幽尋衆山已秀發緑淺未滿林繞寺雉堞壯入門臺殿森阿師久西去遺屐猶至今妙相渺難睹默契情更深合十向雲際恍聞淨土吟四體豈無愛諸妄惟滅心緬彼紺螺色香土歲月沈但餘煙草碧如絲緣塔侵平生慕禪意苦為飢火燖焉知此僻境修廊靜愔愔間間湖上景悠悠南山岑鉏聲編芳野微風匆鐘音暫憩如有會虛寂歸沖襟按蓮池續高僧傳云遍閲中峰語録實未至杭聖水蓋其弟子習靜之所然中峰題東坡大悲像記後書云元至正題於聖水巖則住雲居蓋可信矣前殿三門三楹長廊一帶即西麓內麓外麓三房之廊一名看月廊長廊縱步方九敘塵外煙巒倚碧空回廊宛轉度晴虹樓臺近寺澄湖接杖履疑將法界通拍拍湖波繞郭長霏霏松雨灑衣涼尋山踏遍西湖路誰解煙霞屬上方題長廊四明屠隆緯真煙巒最深處幽鳥啼空山日暮蟬聲急松高鶴夢間魚舟花裏出僧屐雨中還客去禪逾寂焚香獨掩關步長廊西安張文價少谷往來高興發還共步長廊何處石泉響半階瑤草芳孤雲護巢鶴初月滿繩牀供客足清茗何妨言笑長長廊雨望南屏釋篆玉讓山濛濛一湖雨倏忽鏡乍函散入薝蔔林盈耳鳴松杉復嶺賸斜照倚天青巉巉宛如井西畫眼渴縈秋饞淡遠總詩思涼氣歸單衫雲亦作幻住同我還重巖壽春釋淨泓笠江在山雲與住出山雲與遊隨雲意自適徑折屢小休石壁淡素暉夕照上簾鉤羣彥欣所諧爽氣橫清秋驕雷載雲起白雨滿山樓迷濛湖上山遠帶嵐光浮花氣靜不飛餘滴響深楸新涼快披面一聽清溪流釋實懿雲巢結廬恰山凹面面嵐光連萬象媚舄下一榻卧峰巔支許不費招共詠長廊前古迹瘞舍利時或吐雲煙俯仰感今昔六百有餘年雨聲倏西來雲氣霾大千一望盡模糊萬物無𡟎妍如窺米家畫潑墨空中懸如聽陶公琴會心在無絃須臾忽開霽涼意歸枯禪消除煩惱障結習清淨緣秀色接西爽雙鏡明湖鮮峰峰新出沐朵朵青插天塔影挂殘照鐘聲起幽巖欄憑溼翠裏大家聳吟肩長廊夜月六字詩實懿修廊最好明月清輝上我香臺雙鏡湖頭映出四更山頂銜來照眼金波影動會心玉葉雲開宿鳥一聲岑寂松陰又轉莓苔西麓房素菴朴禪師宿西麓釋法聚玉芝遠徑通深麓齋居小更幽松聲四壁雨湖影滿牀秋世路迷真境僧緣息妄求開門漁笛近明月在滄洲又白雲虛閣倚西岑幽興撩人不倦尋鐘聲已忘城市近松蘿忽見寺門深千峰落日鶴相語一樹梅花僧獨吟莫謂煙波總遊事半湖春月共禪心宿西麓朱朴西村平生乍識雲居寺便欲題詩滿石房千頃翠濤欹短幘兩峰斜日據匡牀未經霜樹黃兼緑不出山僧老更蒼西閣夜涼清事足一鐙疏雨漏俱長西麓山房陳鑑句溪門開蒼壁山氣佳千樹萬樹生莓苔堂虛白日有雲度地遠青春惟鳥來石磴陰濃展孤岫林麓聲動喧風雷猶記翻經待明月還從樹裏築高臺過西麓山房錢塘秦舜友冰玉重湖浮樹杪短徑出城頭千步回廊寂雙扉傍竹幽峰陰衣上合雲氣座中流茗碗烹春雨因貪佛日留東麓內房用彰紳禪師即素菴朴禪師之徒祕山堂額西湖毛奇齡書重訪素菴不遇姚汝循兩度相尋竟不逢孤雲何處覓行蹤禪關深掩長廊靜積雪時飄窗外松贈內麓笑雲上人馬三才松里客子乘間策杖藜白雲深處訪幽棲相逢得共高僧語一笑還看過虎溪贈笑雲釋方澤白雲層疊臥青山似與山僧伴掩關薄暮偶然飛出岫飛揚不及在山間有時飛度海門秋蒼狗青虬幻未收何似衲僧巖岫裏身心不動萬緣休東麓外房守泉兼禪師用彰禪師之孫外麓山門聯蓮社臨湖三竺月波浮檻白松關拱堞六橋煙翠疊階青天醫院聯橘井泉香大地無心融聖水杏林花綻陽春有腳遍吳山俱實懿自題芝桂堂額聯趙蒼璧書仁術通禪理祗園即杏林趺翠山樓清明日趺翠山樓同人訪風遠心學兩上人湘潭陳鵬年滄洲紺宇吳山山背開重湖鏡裏見蓮臺六朝僧向雲中老三笑人從雨後來丈室優曇香佛骨殘碑松雪護春苔依然空翠尋趺坐欲酹陶潛酒百杯廣陵一曲起湖波石鼎聯吟繞荔蘿座上茶瓜分供養巖前花雨足婆娑十年取相君何妄半日浮生我覺多不負清明芳草會春泥滑滑亦頻過張愈奇退菴紆折峰陰古殿間一林空翠溼香臺流雲出岫飛還住小鳥呼晴去復來石碣囓殘埋贔屭虬根趫出走莓苔招間暫憩清涼室莫戒深杯與淺杯山城高峙枕晴波一片嵐光淨碧蘿峰外有峰無障礙客中忘客任婆娑冰絃忽瀉流泉出竹閣遙分夕照多為問探幽何所得遠公許我日相過趙瑜瑾叔雲山別自一天開望裏湖光倚鏡臺僧在幽篁趺翠坐客從高頂踏青來過頭藜杖拖煙雨著腳芒鞋沒蘚苔正是使君佳興發況逢令節喜傳杯倒瀉珍珠泛緑波攜琴直上共披蘿梵宮鐘磬連鴛鷲漢殿雲霄傍馺娑疊石栽花間不少焚香煮茗癖何多青山方外無賓主此日疏狂興莫過釋德言心學入望湖光萬頃開東鄰近接大觀臺未隨支遁棲山去何幸元龍帶雨來曲徑春深餘碧草間