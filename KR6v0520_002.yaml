body:
  text: 𧧌湛同明倫原輯通淵同實懿重纂祖師名山勝剎必有偉人焉主席其閒闡揚正教然後鹿苑生輝雞園增色若南宗北秀各啓宗風開山說法者是矣抑或持苦行厲真修使四方欽仰皈依亦足取焉至若橫說豎說總屬旁門朝參暮參不離惑障是則野狐鈍漢實貽瓶鉢之羞寧足道哉今之所書非有光禪門實證善果者均所不列志祖師道膺禪師幽州玉田人俗姓王氏髫年出家於涿州延聖寺參方至翠微聞洞山法師名遂造焉契悟宗旨居豫章之雲居山久之來杭住錫吳山之西著語録行世有傳佛印禪師諱了元字覺老江西浮梁縣人博極經典禪悟超然主席聖水緇素咸欽名人碩士樂與之遊天子聞其名以高麗所貢磨納賜之東坡守杭日與往還其贈答詩文至今流傳中峰禪師諱明本號幻住錢塘孫氏子元帝賜號普應國師虞集銘其塔揭徯斯序其語録趙孟俯書其淨土詩其身履長大倍于時人真佛門羅漢也茶毗于天目本寺建塔藏其髮爪舍利遺麻履二尚藏寺中有傳初松雪極敬禮馮海粟意殊不然及示梅花詩六十首師談笑立和復別成百詠及九言一首馮由是歎服加禮焉天如禪師諱惟則號天如豫章廬陵人髫年出家初參海印禪師後參中峰和尚遂嗣幻翁法往來華亭吳門天目不開堂不領住持到處皈依問法有語録四卷守泉禪師諱照兼海鹽縣陳氏子九歲出家習醫善談論為外麓房之始祖買田六畝在海鹽以貽後嗣塔在留下安樂山宏泉禪師諱清蔭嘉興縣蔡氏子少聰敏聞佛即欣然樂禮住東麓外麓剃髮後復喜習醫雖以術鳴而修持愈力因往平窰聞谷大師所受具足戒歸請徑山義航法師說楞嚴般若等經裝塑彌勒韋馱諸像填山西水衝大坑善行不能殫述先是和尚楚才重建圓通閣未畢而卒師為勉力落成復發願修建大雄殿有木商倪作霖者曾以藥生其命因罄資得三百金託買大木將建殿以畢宏願天不假之以年賫志而歿塔于西山月桂峰下後本山開拓禪房猶用其遺木不盡云寂心字精齊嘉靖庚申寺幾為勢豪奪為窀穸地賴師虔禱神明指示得以保全然師以此弊命杖下明給事戴公紀其事吏部郎中毛汝賢篆都綱良縉里人諸應麟本山住持性哲等立石邑侯胡公復為立傳耆宿光耀無邊盡續慧燈之焰淵源有自總揚覺海之波振此宗風仗我耆宿故寺有初祖以開其基必藉繼世以持其後或證明心性紹往開來或恢宏願力興廢舉墮庶幾三門永輝法輪常煥若僅衣粗食淡完山僧野衲之本分安能使木佛放光金繩永奠耶然則繼世之賢否寺之興廢係焉苟有賢者悉當考其遺行備録而細書之志耆宿雲闍黎宋元祐間住持菴中危坐讀書客來過訪不交一語未嘗窺戶者十五年無疾而化明乘嘉禾陳氏子早歲依雲居出家後禮天目山獅子正宗禪寺中峰和尚受具久之有省還山不忍菴之凋敝經營數載百廢俱舉年五十辭院事精修淨土臘六十有八指月錢塘人姓林投雲居落䰂六時行道薰修懺摩旁通書史喜種植性剛直慨殿宇卑隘躬芟荊莽興工重建頗極壯麗臘七十有三微疾念佛而終潤齊不知何許人中峰為之贊味其語意蓋亦白足高僧而精岐黃者方思字無念仁和人幼弱不樂居塵埃詣雲居剃染惟一衲一鉢蕭然自處二十年不出山天如禪師有無念記至朴字素菴海鹽人性端慤慈慧有恢宏紺宇之志遂建觀音閣萬佛閣方丈兩廊興造之功惟師最多塔在城北望佛橋左侯祠內文紳字用彰海鹽人素菴之徒司主院事成化己丑復建中峰塔院立像智昭字盟谷嘉禾人修隱西麓山居慨聖水廢址尚存遂白藩司奏聞賜金額重煥金碧道孜字義方仁和人清修苦行紹往創新有碑記真心字精齊錢塘人精禪學無俗氛有死節碑記良縉字以雲號賓山桐鄉姚氏子父母知其有釋氏宿因捨送鹽官安國寺性好吟詠正德戊辰剃染為僧復究心儒術詣陽明先生聞良知之說具悉三教異同之旨識見益宏與玉芝聚禪師齊名登萬壽戒壇受戒畢樂西湖山水之勝脫屣故業掛錫于雲居超然山房本郡桂湖陳公舉為都綱暮年移住虎跑寺宗福字東溟吳興黃氏子年十二白父母願出家父母許之投雲居看松山房落䰂性敏而誠恆誦經課佛修懺摩作佛事𧧌湛字休復不知何許人究心禪學博極羣書偕門人明倫纂輯寺志德一字達方仁和郎氏子禪學之餘兼精詩賦一時名流樂與往還年登大耋趺坐而化有詩集一卷寂章字密印桐鄉毛氏子自幼披剃受具足于靈隱具德禪師以醫能救濟衆生遂紹宏泉之技且命如不能作人天師不妨精岐黃術德字寶雨嘉禾人披剃中麓山房禮慕雲覺明兩師參學之外精于焦桐冠蓋過訪有如雲集燕秦楚閩足跡幾遍呂章咸為之傳德言字心學精岐黃工詩能文總河陳鵬年少宰湯右曾仇兆鰲往還唱和有趺翠樓詩一卷祥峰大師昔住香積戒行高妙合郡士民延請至寺開壇說戒元玢字玉山有愁囊集一卷行世僑寓古今高人達士莫不抗志烟霞寄情邱壑視熱鬧場不啻苦海曾不能終日處若遇名山勝境精藍淨社每留連不忍去雲居寺雖在都會之衝實為烟霞之窟且筠寮松舍靡不雅潔故投簪解組之客與探奇選勝之英當其欣於所遇或低徊三宿或憩息經年厯世既遙寓公不少凡有足稱者書其爵里姓氏使與名山同不朽焉志僑寓杜真人南容人不詳名字有修煉術能符藥濟病又能祈禱晴雨與松雪趙公常往還于雲居中峰師亦不以玄教而拒之有如遠公之遇修靜也楊維楨字廉夫會稽人有重名不樂仕元寓七寶山鐵冶嶺因號鐵崖日遊雲居為養真之所薩都刺字天錫雁門人元至正問官至學士來浙寓居厯覽名勝題詠幾遍孫一元字太初太白山人丰儀秀朗踪跡奇譎玄巾白祫混遊塵俗常以鐵笛鶴瓢自隨寓所會心輒一傾倒初談導引人疑其仙晚始婚娶入司空劉公湖南雅社詩詞瀟灑雪江居西麓數與往還或共住彌月後雪江移居聖果孫居湖南西隱菴清江皓月映照兩人鄭憶蘭隱于山寺宏治間石塘王本仁孫德昭德誠同訪之有詩夏元吉字維哲德興人明永樂時官至戶部尚書諡忠靖因奉命督餉至浙寓聽松樓著看松樓記留詠諸什墨蹟猶存劉鑄陽人洪武二十六年應浙藩之聘司文衡之任寓寺彌月有和王方伯詩墨蹟王守仁號陽明餘姚人有明一代儒宗正德時封新建伯諡文成每過錢塘即榻雲居釋法聚字玉芝號月泉別號天池老人出家海鹽資聖寺聞陽明先生講良知有省後參方契悟宗旨遊杭喜西麓幽勝居數年出度世緣有語録詩集釋明秀字雪江海鹽天寧寺楚石禪師十四代孫寓居西麓聽鶴堂數年後移居聖果號石門山人終于天寧有詩集徐渭字文長號天池一號青藤道士會稽人書畫詩文無不入妙中丞胡宗憲辟至幕府每出即以雲居為別館袁中郎有傳釋廣印字聞谷嘉禾人本郡清屏山開元寺出家參成都儀丰禪師有省復參雲棲蓮池大師興藂席于陶山今為真寂院後因藂林事繁愛雲居幽謐常養靜愛松山房祝鑾字篁溪抗志烟霞怡情山水嘗居雲居別業與太白山人為世外交查繼佐字伊璜海昌人博學高才書法直逼魯公不樂仕進惟癖泉石坐卧雲居經年彌月寺藏其詩字甚多黃機字次辰幼時肄業外麓山房達方師年七十時製文祝之官文華殿大學士仇兆鼇字滄柱康熙乙丑進士官至吏部侍郎為時聞人與韓慕廬菼翁鐵菴叔元胡抑齊作梅陳介眉錫嘏齊名讀書寺內請業者甚衆趙蒼璧字圜菴康熙壬戌進士官侍御讀書外麓山房詩文甚富僧心學輩俱其造就令子荃蘇芝亦久肄業于寺陳鵬年字北溟號滄洲楚湘潭人康熙乙丑進士官至總河初任西安令每至會城必至雲居解任後下榻外麓山房日事吟咏墨蹟甚多蔡升元字方麓宏泉師之族也在寺肄業數年康熙壬戌科狀元官至禮部尚書張嗣溥字銘軒衢州開化人選拔貢士同弟嗣博每如杭即寓外麓山房為人好善刊戒殺戒淫等書行世陸有繩字道𦙌本郡人官延津未遇時靜攝山齊多厯年所有募修雲居引魏㟲字雲岑大名人康熙丙戌進士宰錢邑謝事後寓中麓孤雲兩房徐涵字季容崑山人大司寇健菴先生之孫中康熙己卯鄉薦官溫州太守襟懷瀟灑詩酒淋漓不減王謝風韻公子記名于通淵法名智耀盧奠勳字敏功仁和人標格高逸詩文古秀讀書趺翠樓上人以為仲宣再世錢琦字相人仁和人肄業趺翠不事遊覽潛心經史識者知為偉器唐建中字赤子號南軒楚天門人康熙癸巳進士翰林才名震俗樂雲居之幽異趺宕詩酒布祫履悠然自得人不知其為太史也周漢傑字房仲江西人官副使寓居年餘著有蘧菴集為本寺作志序胡石圃諱作柄為仁和邑侯解組後寓外麓十有餘載陶情詩酒作三台石記周經邦字凝巫一字理齊號龍岡其先江南雲門人也祖勿菴諱份始遷于杭占籍錢塘博學高望後學宗仰與甬東鄭梁禹梅仇兆鼇滄柱齊名晚歲登康熙己酉賢書一試禮部擬第一人復失去遂不再上春官以宏博徵固辭不就留京師十載名公卿大夫推重之再傳至孫邦讀書外麓山房著有四書大全參閲尚書約義龍岡藝志樊桐山人文集長子天度字心羅庚午科解元玉環司馬李公諱惺延課諸子假館外麓金志章號江聲錢塘人官口北觀察解組後游雲居吟詠頗多著有江聲草堂集杭堇浦諱世駿錢塘人以宏博徵官翰林編修文章詩賦人皆宗仰暮年歸里不時吟嘯雲居朱鹿田諱樟為澤州太守住居山右朝夕吟眺著集頗多黃松石號楷癭仁和人博學多聞隱居城北長至寺吟眺汪沆字西皓別號槐堂錢塘名士以宏博屢徵不赴有沽士題襟等集每閒過雲居吟詠忘返施安字竹田本郡名士也風流跌宕每至寺吟嘯張世犖字無夜別號妙峰登甲子科解元博通內典每覔句于佛印吟廊之間吳樹虛字西林仁和處士也隱居城北不與外事學通三教著述等身每月朔至趺翠山樓講論楞嚴諸經義布衣芒履超然物外戴廷熺戴廷熺字綸掌別號珠淵辭榮歸里陶情山水詩筆清綻每偕丁鈍丁金壽門周穆門吳甌亭邵晉之諸名士登眺雲居吟詠竟日柳溥字德洋別號潔夫錢塘明經辭宗黌南歸設帳于外麓山房居十餘年與僧崙山築山亭于東嶺之巔執經問字者屢滿戶外詩才敏捷為文立就有城南十六子之名釋明奇字具如別號懶雲吳興人也始開堂于平湖上乘寺次遷小崇福再住香積寺後住維揚天寧禪寺方丈退院後隱居西湖之北書法絶倫禪學精奧面如滿月暮年往來雲居即雲巢嗣法和尚也今塔在西溪汪皋鶴字立亭徐州人曾署錢塘令愛民如子頗有清聲政事之暇過雲居吟詠探幽靈異石言於晉神降於莘見之於經書之於傳其在梵策如來在西域現種種神通流傳中國以為美談是知幽奇玄怪之事世所時有世人狃於聞見凡耳目所不及輒斥為誕虛陋矣雲居自唐厯明六百餘載或仙或佛屢有異徵雖理標象外說似鑿空而蹟著山中事皆托實因述向之所聞以傳來葉云志靈異呂巖施肩吾皆唐進士相傳仙去明宣德元年兩乞丐至寺門語笑移日臨去草書一回字又楷書方人也三字識者謂二公降臨云世傳道膺禪師清臞如鶴採薇蕨以代齊糧或彌月不食宋乾道間僧能會就巖建菴取巖下水咒之以施病者輒愈黃龍洞僧宋理宗時人自諱其形矮劣因洞巔有巨石命工肖己形長丈餘飛雲隱其足祝之曰願後世有身等此涅槃後託身錢塘孫氏有異相及長身長九尺有奇出家即中峰和尚也所遺麻履二倍於恆人今尚存寺中正德間一士人過鍾翠亭見二乞對食肉糜盛以青荷時殘臘積雪士疑深冬無此鮮荷葉正詫其異二乞即起行尾之至寺門見其入踪跡之不可得嘉靖庚申寺將為勢橫所奪僧衆虔禱伽藍神神流汗不止者三日遠近來觀事聞當道寺賴以全精齊禪師因勢宦傅姓欲奪寺作葬地禱於土神忽見老人指示曰雲居山有王者氣太史謀之是何意將此二語遍貼通衢則事寢矣後果然明正統間因鼓鑄有毀各寺觀銅器之檄寺僧懼大鐘不能全羣禱于伽藍殿時鐘已被當事傳工役舁出山門忽墮地數百人莫能移銀臺張石川聞之知佛力護持止弗燬仍舁至大殿僅數人力耳舍利法雲塔耆舊相傳塔成每夜晦見周匝有白光久之入塔縫太守劉半堂手植蒼松三十株大已合圍有欲翦伐之夜夢長髯叟誦楞嚴咒醒悟而止關帝聖像舊在正陽門康熙十三年忽放光布政司佟公諱國器以夢兆請遷於大殿之東廡有僧夜見白光起于井中是日大雨豈龍也耶玉觀音菩薩高尺餘萬曆丁亥歲旱都司前衛浚井得磁相法身端好瑩潔如玉因稱玉觀音王都閫送祠于圓通殿越數年有私移別供者即搆奇禍旋即奉歸天啓癸亥秋寺衆咸夢大士云應化他方晨起遂不見相有人見于吳門北禪寺至寺訪求寺僧云有一居士送此因集衆迎請歸山隨即失去松嶺古塔基每遇秋月皎潔夜半現五色祥光或如來法相古蹟世尊常云一彈指頃成去來今天運且然況人事哉故榮華過眼譬之空花等之泡影是不獨甲第名園有然即精藍香界或經兵燹或毀雨風向之朱甍畫桷崇宏岌嶪者悉墮劫灰倘不急為標舉久將湮沒無聞聖水寺屢廢屢興自宏治至今則經臺講室半歸虛無有如前所云者幸佳名尚存舊蹟可考是賴有力者一振興之庶幾重換雲山之色豈非三尊之厚幸歟志古蹟大雄殿五楹今廢觀音殿三楹有樓旁有兩披今廢方丈三楹有樓外有兩廊今廢十王殿三楹在天王殿西愛松房後今廢圓通殿三楹今廢秋夜坐圓通閣釋德一達方題閣敞月飛白山高雲㘈流鳥啼星夜午葉落竹亭秋調古琴難和詩閒筆未休坐聆玄誨後從此欲盟鷗藏經閣今廢萬松閣今遺址即南溟房尚有數百佛祖立平屋影壁聽松樓今廢法雲塔在中峰祖師塔院後今廢鼓兒井不知闢是何年井欄如大鼓狀故名昔有本寺沙彌誤落井中自辰至未不沈不溺救起無恙詢之云如有人背上託起亦神明之默佑也乾隆辛卯冬大旱外麓葦航鳩工浚之去土石四百餘擔下周圍大三丈六尺深五丈五尺傍有活石如觀音兜可藏十餘人津津水脈微流疑泉竅在是焉下有條石三十九層上皆大甎砌繞闔寺飲汲皆賴此井石亭在橐駝嶺上過客行人憩足於此東瞻朝旭秋濤西覩湖光山色真勝概也今廢振衣亭拒城十數武臨高縱目迥出塵表真有振衣千仞之勢今廢讚玄亭今廢址側片石似屏有紀遊姓名年久模糊苔蘚駁蝕不能識疊翠亭在三門外右百五十步城外西南諸山排青聳翠撲人襟袖坐久忘歸不知此身猶在塵埃中也閏重九同讓山漏雲登疊翠亭故址實懿閏九同幽討攜筇到屋西雲和山不斷霞映日初低亭廢惟留蹟僧閒各有題徘徊頻竚望老我在招提古塔基去松樂亭址百步先有七級浮屠影落塔兒街今廢超然臺在超然房之後高阜夷敞諸峰列峙兩湖浮映超然于塵俗真絶境也今廢怡筠房于雍正八年僧清遠將破平房五間連屋基園地悉賣與朱宅為讀書別墅于雍正十三年外麓僧崙山係本寺之産不忍淪沒勉力用價贖回而屋宇年久坍損惟基尚存今歸外麓辦糧竹隱房中麓房超然房山居房今改瑞凝道院外餘地一方向屬西麓房管業後西麓契賣于外麓乾隆三十六年間憑黃金聲蕭成子二居士捐資買助道院後因仁和邑侯高公建紫霄宮今晶凝別墅之址即是其地雲居總名辦糧無從開付公議每年道院住持出津貼錢一百六十文訂于端午節交入外麓以為永遠抱納之資并有公議津貼糧票一紙存外麓為照松隱房看松東房看松西房嘉棲房曉然房般若房翠東房翠西房玩松房以上諸子院俱廢
