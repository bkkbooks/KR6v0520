front:
  text: 雲居聖水寺位於浙江杭州西南雲居山上雲居山位於吳山又名七寶山之西南面聖湖倚楓林吳山之北有紫芳嶺上有聖水巖巉石突兀勢若垂雲唐咸通中八六八七三道膺禪師遊杭州入七寶山愛其山麓即雲居山之勝就樹結菴顏曰雲居宋元祐間一八六一九三佛印禪師喜聖水巖之幽勝乃安禪以聖水名其寺元代中峰和尚重建眾僧雲集漸成叢林名與五山十剎並列趙孟頫手書雲居匾額明洪武二十四年一三九一勅旨歸併天下寺院聖水寺併入雲居菴賜額雲居聖水禪寺其地襟江帶湖與天竺靈隱並稱古剎勝覽而中峰禪師之髮爪舍利藏寺中之塔頗為後人瞻仰清雍正年間釋𧧌湛偕門人釋明倫為輯寺志乾隆年間釋通淵偕門人釋實懿重纂之釐為六卷分十一門形勝建置祖師耆宿僑寓靈異古蹟題詠法譜贊偈清規前冠寺圖末附補遺形勝一門紀山水建置一門僅紀現存者祖師一門僅列光耀本寺之祖師即道膺佛印中峰等七位之簡傳耆宿一門則記有功於本寺之僧侶僑寓一門記古今高人達士之寄寓本山者靈異一門記自唐至明六百餘載之異徵古蹟一門凡本寺之建置今已廢者列入古蹟題詠一門錄歷代文士關於本寺之詩文法譜一門錄塔傳歷代禪祖本寺高僧傳壽序菴記塔記等贊偈一門錄贊詩疏偈等文清規一門除僧燦與明本所訂之清規外文疏之屬亦附焉本志分門明晰然體例紊亂恐係增補之故也此志初刻於乾隆二十七年一七六二光緒十八年一八九二錢塘丁氏重刻兹據清光緒十八年錢塘嘉惠堂丁氏重刋本景印雲居聖水禪寺志序雲居聖水禪寺者地接兩峰名齊三竺帶海襟山之所法宇宏開龍飛鳳舞而來琳宮矗峙層巒絕巘闖見山門白石青苔疑來仙洞近挹湖邊秀色揜映松關遙傳江上濤聲悠揚梵咒宜卓錫之高人踵至而攜瓢之韻士聯踪然非載筆而載言奚以徵文而徵獻必有資乎慧業乃克永夫勝因粵稽禪寺創自李唐綿亘千年鐘無恙遞更數代榱桷維新溯厥開山道膺因雲居為號洎乎奕葉中峰合聖水成名仰金碧於烟巒詢經營於慧衲風車雲馬常駐靈旗暮鼓晨鐘時聞法誡皆資人力用妥神庥然而玉梁飄渺銀殿虛無給孤園中數聲鶗鴂靈光殿外一片荊榛若無子安之碑誰知淨土使非休文之記詎識法王紺馬青鴛藉詞章而不朽龍宮象塔因翰墨以常畱鼓若海之文瀾慈航寶筏燦生花之筆綵蓮座香城此尋奧旨於六通固在語言之外而證妙諦於三藏不離文字之中欲示畱貽須憑記載志書之作烏容己已顧寶笈難窺草創始於寂湛瓣香已遠重纂在乎通淵卒業未成舊章誰續乃有雲巢衲子者有如支遁居白馬以談元略似晦堂住黃龍而作志從源達委井井有條別類分門班班可考情最躭乎吟咏後復附以詩篇允矣梨棗之光可推鴻筆採茲芻蕘之句屬以弁言楷也禁省周旋鄉關契闊童子嬉遊之地為念林邱詩人恭敬之思詎忘桑梓今則遂初已賦儘幅巾朱履而歸方外與遊可蠟屐芒鞵而至錫香山之鳩杖陟險非難主松嶺之鱣堂卜鄰伊邇因名求實援古證今倍領妙手之空益信良工之苦每掀髯而大噱何必坡仙或並轡以聯吟相逢㠀瘦又況右文有典重羅碧海珊瑚茲雖史乘小言總屬吉光片羽曾聞半偈空彼萬緣還見五雲生於二乘裒然成帙君為夾漈之所難率爾操觚我恐溫陵之騰笑矣時乾隆癸巳四月初吉仁和七十八歲老人陸宗楷鳧川氏序序國有史家有乘所以原本大業而永世也而郡邑而山川而奧區古剎志猶是已杭城吳山之陰曰雲居在大江以西余數年于浙未嘗過問己丑乞休寄跡南溟見僧幻因所藏中峰祖師親自寫照及手置壁間諸相次觀麻鞋髮珠諸盛蹟乃知斯因師著天目雲居並峙大雄匪凡近也顧猶未詳夫開山得名之緣起有僧休復雅懷纘述示一編曰將有志而未逮本末條理燦然可觀泝自唐咸通中玉田道膺禪師由涿州住江西雲居山既而至杭結茆於斯而不忘雲居仍以名菴至明以聖水寺并入乃稱寺然則中峰此山振起之少祖道膺此山肇基之初祖也然則山非浙寺非自唐宋元而菴非自今也然則一雲居江可也浙可也菴與寺無不可也然則無江相無浙相無山與菴與寺相何為雲居是為雲居然則即一雲居曰江曰浙曰菴曰寺非名非非名可說不可說已縷縷矣謂可無以志之乎況乎祖風為烈天如無念輩繼武龍象東坡松雪陽明輩暉映後先湖山奇湊江海大觀以暨一石一木都堪譜牒奈何聽其落落無迹令後之人若今視咸通以前莫可致詰乎誠哉休復是編之弗可已也而屬余一言亦似弗可辭何也雲居為吾鄉名山十年來顓愚衡大師自五臺厯南嶽清源至止余實荷法施其在杭也嗣中峰法者首推天如即我廬陵人且中峰證祖位彰隆號而垂藏法吾鄉揭曼碩為贊其詞而余之藏疾于斯亦敬入告矣則雲居之為雲居聖天子既耳目及之余之于雲居也亦既辱指十手雲居也余也豈無因緣于其間余何能辭一言也順治六年冬十月豫章周漢傑拜撰序凡都會必以形勝財貨之所聚人文之所毓技巧之所出於以醞榮饒而傾恢詭匪細也武林甲寰宇郡兼山川之美波迴麓抱更僕數未殫顧率郭外名藍或以爽塏或以幽奇著若憑高而江湖生於屐底則惟城中之山為然昔越沼吳以此置吳社然由伍行人祠循而南至三茅觀道院十九類顯拔千尋縱眸即見再折而西藏鈴鐸於蓊蔥磴而下磴而升高楓負湖鳳凰諸山出於列雉惟雲居寺為然寺緣僧道膺卓錫開山名新志舊大德間起英流競賞獨志缺焉亦子瞻孟頫之遺憾也夫蘭若或牛吼不及或離聚落五里茲寺隱軗肩之中窅如絕壑嶺足即市闠廨舍萬猾嘈囂都若隔世惟鳥語蟲鳴而已然則有三竺之谿山四合而無車騎列肆之豔雜有靈隱韜光之林木森蔚而無燐明虎嘯之蒼涼有昭慶之人烟湊集淨慈之獨踞連岡而無嚴闉夜閉當塗晝呵之驚虞誠攀躋之所必至而眺覽之所首推者也宜中峰薰脩於斯梅詠芒鞋猶存人世厥後寺幾為勢力有賴精齋以死獲全暢宗風而持覺苑不可泯滅拈花漬羽其揆一也寺有二徑一從鐵崖嶺一從青屏山奇石妙樹天巧布錯違歌鐘於頃刻無裹糧於十里塵念不雜于此中者代固不乏人即偶至者亦自能識取也聞之長者云雲居之松不獨松樂亭為量隨地挺虯飛雨間不容髮亭旁為官長張筵騶從伍伯所戕更有不堪述者其他可令久而或湮哉則茲志信當作矣浙上傅巖書序名山古剎之形勝人物郡乘邑志有未採輯者則各成一書詳紀其鉅細以信今而傳後或名流或高僧窮年矻日殫精鉛槧惟恐一事一類之不備不彰以為山靈佛祖羞如通淵實懿之志雲居聖水寺是已寺建自唐咸通中為佛印中峰拄錫之所其地爽塏幽異襟江帶湖跨吳山之西偏與天竺靈隱並稱古剎千百年來緇涅之接踵賢豪之萃止殿宇之脩葺文物之昌熾郡邑雖載紀之通淵以其不能周該備至且懼厯代久遠易湮沒而無聞也遂取寂湛草創之原本重加攟摭不漏不支成志六卷俾天下後世莫不望武林而思名剎瞻經幢而景蘇趙即或給孤園圮布金地廢而雲居聖水之名猶表表塵寰間也世之士大夫悠悠忽忽于郡邑之志乘漫不加意即其家世譜牒亦茫然烏有以視通淵實懿之用心顧何如耶余家居時雖于祖德宗功暨桑梓之耆舊粗有紀刊而學識淺鮮不能纖悉具陳至官仁邑于地方之風土人情因革損益之規縱不敢以無才自諉而邑志未暇修舉今對通淵不亦赧赧然有愧色乎而凡吾儒之閱是志者固不特嘉通淵實懿之願力茲寺賴以不朽亦可借以自勉勤于家譜邑乘之篆訂以光照國家之盛於無疆也是為序旹雍正七年歲次己酉仲夏月上弦日勅授文林郎知浙江杭州府仁和縣事甲辰科浙江鄉試同考官荊門胡作柄譔序雲居寺志先師尊寂湛草創於前吾師通淵掇拾於後雍正己酉仁和邑侯荊門胡公罷官居寺甄綜而薈萃之遂成完書科分條貫可謂備矣顧三十年來佛舍僧寮金碧輝映於山水間者化為烟雲圮為瓦礫見于志者十存四三而已可勝慨哉夫志以傳信倘不重為釐正一切仍舊則名存實亡將使覽者按圖索駿視為誕虛不且貽四方之誚乎懿因不揣譾陋於山川泉石之不變者悉仍前志其餘蓮臺香藏則據現在具書之已廢者詳於古蹟一門庶幾不戾傳信之旨方今聖天子勤咨吏治隱念民生四舉巡狩之典湖上諸名剎無不鼎新以備皇上恭祝皇太后慈釐純嘏而我佛亦祥雲曖日香雨灑塵釀和氣於翠華遙蒞之辰於以媚一人而成景運者寺僧或裁新志或益舊文極古今之盛焉雲居雖僻在吳山一隅然峰巒聳秀江上數峰湖間諸嶺縈青繚紫如繪如畫映帶左右者一憑眺而悉在眼前安知無大檀信廣結善緣捐朱提貫赤仄以完舊觀為後日皇上拈花獻佛之所則志誠不可以已也因購棃棗而急刊之釋實懿撰雲居聖水寺圗身如天目山寂然不動尊慈雲灑法雨徧滿十方界化身千百億非幻亦非真覓贊不可淂為師作贊竟至正二年正月人日弟子吳興趙孟頫焚香謹贊聖水寺志目錄卷之一形勝建置卷之二祖師耆宿僑寓靈異古蹟卷之三題詠卷之四法譜卷之五贊偈卷之六清規補遺聖水寺志目錄
