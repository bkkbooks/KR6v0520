body:
  text: 𧧌湛同明倫原輯通淵同實懿重纂清規天下叢林祝國佑民定有軌則晨鐘暮鼓必藉壇儀致於禪誦之餘趺坐課香參臨濟喝德山棒天皇餅趙州茶一千七百重公案工夫到日疑團頓釋豁然了悟如香巖擊竹靈雲見桃太原聞角洞山過水如此輩皆具大乘根器全在堅持戒定慧三法早已斬截貪瞋癡三業方能法程可循取捨有方浮圖一級初發信步必由威儀而入故大智立清規百丈建叢林一動一靜須循模範豈可漏略莫謂豐干饒舌實為後賢指南志清規信心銘三祖僧燦大師作中峰祖師注解至道無難唯嫌揀擇但莫憎愛洞然明白毫釐有差天地懸隔欲得現前莫存順逆違順相爭是為心病不識亥旨徒勞念靜圓同太虛無缺無餘良由取捨所以不如莫逐有緣勿住空忍一種平懷泯然自盡止動歸止止更彌動惟滯兩邊寧知一種一種不通兩處失功遣有沒有從空背空多言多意轉不相應絶言絶慮無處不通歸根得旨隨照失宗須臾返照勝卻前空前空轉變皆由妄見不用求真惟須息見息見不住慎勿追尋才有是非紛然失心二由一有一亦莫守一心不生萬法無咎無咎無法不生不心能隨境滅境逐能沈境由能境能由境能欲知兩段元是一空一空同兩齊含萬象不見精粗寧有偏黨大道體寬無易無難小兒狐疑轉急轉遲執之失度必入邪路放之自然體無去住任性合道逍遙絶惱繫念乖真昏沈不好不好勞神何用疏親欲取一乘勿惡六塵六塵不惡還同正覺智者無為愚人自縛法無異法妄自愛著將心用心豈非大錯迷生寂亂悟無好惡一切二邊良由斟酌夢幻空花何勞把捉得失是非一時放卻眼若不睡諸夢自除心若不異萬法一如一如體玄兀爾忘緣萬法齊觀歸復自然泯其所以不可方比止動無動動止無止兩既不成一何自爾究竟窮極不存軌則契心平等所作俱息狐疑淨盡正信調直一切不留無可記憶虛明自照不勞心力非思量處識情難測真如法界無他無自要急相應惟言不二不二皆同無不包容十方智者皆入此宗宗非促延一念萬年無在不在十方目前極小同大忘絶境界極大同小不見邊表有即是無無即是有若不如此必不須守一即一切一切即一但能如是何慮不畢信心不二不二信心言語道斷非去來今貪瞋癡針并序明本一迷根乎自心縱而為貪抑而為瞋合而為癡良由迷無自性由不守正念而生以其生故曰貪曰瞋曰癡皆一迷之異名也聖人不以砒霜鴆酒為毒而以此為毒者以其喪壞法身淪溺慧命也今三有界中衆苦充滿無有一物不本乎貪等一中其毒則殺盜淫業四面紛合卒莫之避良可哀也惟悟達自心洞契法源之士能奪其縱之之貪以求道返其抑之之瞋以治心轉其合之之癡以利人資長法化則貪瞋癡果何物耶乃為針曰惟貪如海瞋以火喻癡比同雲依一心住心迷則來心悟乃去優劣聖凡不離當處勿强分別毋勞指注如手掌兮放開捏聚戒定慧針一悟根乎自心懶而為戒守而為定融而為慧良由悟無自性因不失正念而生以其生故曰戒曰定曰慧皆一悟之異名也聖人不以栴檀沈水為香乃以此為香者以其光明靈臺盤結不散莊嚴法性之上妙具也今雜華法界衆寶充滿無有一物不自吾戒定慧而生焉一薰其香則法報化之跡隨念出現其有尚存悟理未盡功勳者執其存之之戒以違宗泥其守之之定以礙理放其融之之慧以失妙欲望其超然於寂照圓明之戶未知其可也戒定慧云胡不辨哉乃為針曰由戒而定即定以慧三法互融了無向背薰之為香充塞大地惟聞在心嗅不以鼻功用兩忘動靜一致如走盤珠不可思議喜針世之所謂喜者由適情遂欲而生焉道人不爾必使情消欲盡動與理融不遭愛見諸魔之所惑其喜也政未易以足蹈手舞既其情狀者焉針曰至哉之喜微法源底曰如意輪契解脫體愛見不住情欲何倚劫外春回華開碓觜怒針為物所忤怒氣結為心火至使面赤髮立不蹈禍機不已也聖賢則不然其一怒如金剛王劍諸煩惱魔嬰其鋒者應念斬截然後致萬物於無諍之地則其怒也豈徒然哉針曰聖賢奮怒不墮諸數𨚫煩惱魔成大法聚嗟凡夫瞋燒然無度當處撲滅神機獨露哀針凡夫哀聖賢亦哀凡夫結情妄而致哀聖賢乃哀其所哀也於是發為辭章悲奮激切必使其感愕於中脫略情妄則其哀也豈可與凡夫同日而語哉針曰聖賢悲極咸致斯哀辭章奮切含吐無涯淳漓道喪其誰不懷凡愚自若傷已焉哉樂針樂莫樂於道道為天下之極樂捨道而求樂是猶棄食而求飽也世之昧者縱聲色之欲而為樂一報忽盡變化萬殊不知與苦循環豈其所謂樂哉針曰三界無樂動遭業縛達人大觀目之倒錯寂滅真常非修非作當處現成地平天廓世稱叢林者蓋取喻於草木也法道之所寄材器之所從出焉然草木培植則豐沾濡則榮霜雪則凋斧斤則敗叢林以無上大道為培植以慈悲喜捨為沾濡以偷安利養為霜雪以貪欲瞋怒為斧斤主叢林者不諳其培植之道沾濡之理則草木病矣況貪安利養之霜雪貪欲瞋恚之斧斤時時斫伐而殞穫之故其草木區萌芽蘗猶不暇而欲望叢林之盛材器之盛難矣哉吾叢林揖讓升降之謂禮鞭笞擯辱之謂法古之人欲行所得之道必以禮法輔之而道行焉禮者防於未然法者治於已然其或道之所存豈必待禮而後正法而後從者然叢林用禮法猶國家之用兵蓋不得已也特假此以規正學者之心術與其儀範耳倘不本之以至道而膠於禮法者則禮出于虛詐法近乎仇敵虛詐易忘仇敵生變禮忘法變併其心術亦大壞矣儀範云乎哉臨濟鐘板五板後堂內行香鐘三陳內一板一鐘擊長鐘鐘完內二板一鐘擊鼓鼓內三板一鐘止靜即開大靜打板三陳擊雲板上殿晨課回堂聞開梆雲板三下過堂回堂當值打板一下鐘一下起香香半炷二板一鐘香剩一寸鳴魚二下抽解人齊香完三板一鐘止靜當值行禮香完打引磬一下開小香三枝當值送香聞開梆雲板三下過堂回堂當值打一板一鐘起香照前行事香六炷半當值送香聞開梆雲板二下過堂回堂當值打香鐘三下擊長鐘上殿夜課回堂當值打一板一鐘上單養息將暗起香香半炷二板一鐘香完剩一寸鳴魚二下抽解人齊三板一鐘止靜香完打引磬一下或三炷或六炷開大靜上單養息本寺朔望祝延聖壽進殿禮拜問訊立定念無量壽咒畢舉藥師如來二稱皇帝萬歲一稱凡三遍又稱皇帝萬歲萬歲萬萬歲畢念大圓滿覺應跡西乾心包太虛量周沙界仰叩洪慈俯垂明證奉據大清國浙江等處承宣布政使司杭州府僧綱司雲居聖水禪寺住持比邱某某等於今年月日住持入院良辰或朔旦望旦之辰常住營備香花燈燭茶果珍饈以伸供養謹集合山僧衆恭趨寶殿持諷祕章稱揚聖號所萃洪因端為祝延今上皇帝聖壽無疆皇后齊年太子千秋文武官班同增祿算伏願金輪永鎮玉燭常調八方歌有道之君四海樂無為之化現前大衆念金剛無量壽護國仁王菩薩摩訶般若波羅密接上楞嚴咒畢念上來諷咒功德回向真如實際莊嚴無上佛果菩提祈禱大慈悲父靈感觀世音菩薩諸大菩薩次伸祝供光明會上護法列席諸天大權仙衆遍及三界滿空聖賢十方護法龍神遐邇廟貌神祇守護伽藍真宰所冀山門鎮淨檀那福慧莊嚴四恩三有均資凡聖同緣種智更冀現前衆等修行有序進道無魔般若智以早明菩提心而不退念大悲咒一遍消災咒一遍畢繞轉念大悲消災咒各三遍進伽藍殿念摩訶般若波羅密多三遍念神威凜凜常為護法之神聖貌堂堂永作伽藍之主仰啓神聰俯垂照鑒僧衆上來誦諷大悲中道無礙神咒消災妙吉祥神咒稱揚聖號所集功德專伸祝貢當山土地護教聖德明王廣平侯周宣靈王招寶大權修唎菩薩護伽藍神合堂真宰所祈山門鎮靜內外咸安火盜公私諸緣吉慶十方三世一切佛一切菩薩摩訶薩摩訶般若波羅密釋迦如來二月望日涅槃疏曰鷲嶽膺期顯一乘而極唱鶴林顧命指三德以歸真自高山先照示以出興至峻嶺餘輝云當入寂知唱生而唱滅恆常不變法惟本然見全始而至終會必有離世相如是醫師背喪賈客他行花柳無私俄遊逢于遠日蘋藻可薦罔敢墜于遺風式表芹誠仰祈藻鑑伏願分身俯降護身使佩于靈符慧命長存贖命見頒于重寶庶令後裔克紹先宗二月十九日大士降誕文疏大清國浙江等處承宣布政使司杭州府僧綱司雲居聖水禪寺伽藍下居住稟佛遺教比邱某某等稽首焚香恭通情旨於今年月日恭遇普門大士示生之辰常住虔備香花燈燭茶果珍饈如法供養雲集合山僧衆登臨寶殿諷誦大乘妙法蓮華尊經稱揚聖號所集殊勳上酬南無大慈大悲救苦救難廣大靈感觀世音菩薩伏以圓常智體三千剎海無日而不生湛寂真身微塵國土中有念而皆土中有念而皆應因垂形於世界以降跡於斯辰碧桃花露溼春風獻園林之上供紫竹林中敲夜雨宣海藏之真詮輒罄微誠仰酬慈蔭伏願萬億香水海流通佛事長為菩薩廣大願王百千日月光洞照普門永作衆生清淨眼目但某等下情無任瞻望慈容激切屏容之至謹疏上中峰殿作享繞念楞嚴咒畢即回向文云寶明空海湛死生漩伏之波大寂定門營今古去來之相仰啓慈容俯垂明證奉據大清國浙江等處承宣布政使司杭州府僧綱司雲居聖水禪寺住持比邱某等茲今年月日或清明中元冬至令節之辰常住營備香花燈燭茶果珍饈以伸供養謹集合山僧衆登臨寶殿唪誦大佛頂首楞嚴萬行神咒稱楊聖號所集殊勳奉為佛慈圓照廣慧智覺普應國師中峰大和尚上酬慈蔭伏願重提祖印輝佛日於中天再整頽綱扇真風於末廕接念金光明經心經大悲咒往生咒各一遍念大哉阿彌陀極樂無量壽巍巍西足尊智慧光明集仰啓靈儀俯垂明證僧衆上來念誦西方教主無量壽佛聖號金光明經顯性空品般若密多了義心經大悲中道無礙神咒決定往生成佛根本真言稱揚嘉號所集殊勳奉為開山和尚厯代住持前亡後化僧行覺靈證大菩提齊登佛界伏願祖宗遠降來乘明昧之光華淨魄昭彰去享高天之快樂十方三世一切佛一切菩薩摩訶薩摩訶般若波羅密四月初八日釋迦佛誕辰進殿向上排班開具三拜獻供先舉香讚次宣疏九龍吐水灌沐金軀奉佛遺教慶誕沐浴比邱某等具疏宣鄉貫同前秉佛遺教慶誕沐浴比邱某等洎合山僧衆恭通情旨稽首焚香伏為於今年月日恭遇釋迦如來示生沐浴之辰常住營備香花燈燭茶果珍饈以伸供養謹集合山僧衆登臨大雄寶殿嚴持香水灌沐金軀諷誦大悲中道無礙神咒摩訶般若密多了義心經稱揚聖號所集殊勳上酬本師釋迦如來大和尚伏以春滿毗藍園優鉢曇花自天垂降香繞無憂樹妙菩提果當處發生白玉毫萬象瞻依黃金軀九龍灌沐諷祕密之真詮敢忘遺教獻蘋蘩之薄供仰酬慈恩伏願智慧海宏深蕩慈波於無窮無極功德山高聳垂道樹而益茂益榮同十方諸佛大轉法輪與法界衆生俱成正覺但某等下情無任瞻仰慈容不勝激切屏營之至又釋迦如來二稱無憂樹下聖母攀枝釋迦如來二稱九龍吐水灌沐金軀香烟繚繞儼然淨梵宮中燈燭交輝宛似毗藍園內切以法身非相祥光靉淨梵之宮顯跡應真瑞氣降迦維之國金身生下便能一手指天寶相沐時遂感九龍吐水四方遍顧七步成蓮稱上下之獨尊感人天之交讚不戀王宮富貴直趨雪嶺修行十九學道出家三十成佛作祖演藏經五千餘卷住浮世七十九年開三乘方便之門闢十界超生之路於昔周昭王甲寅二十四載我佛降生當今聖朝厯三千八百餘歲遺風宛在今辰釋子廣嚴殿宇謹集衆僧滿泛香湯灌沐金軀望我佛以慈悲愍衆生而賜福更冀現前衆等般若志於早明菩提心而不退欲增佛日光輝須仗雷聲同和南無本師釋迦牟尼佛天上天下無如佛十方世界亦無比世界所有我盡見一切無有如佛者諸佛容顏甚奇妙放大光明照十方當來我適曾供養道場今復還親覲毗藍園內降生時龍與諸天咸灌沐如來所有吉祥事我今灌沐亦如是我今灌沐諸如來淨智莊嚴功德聚五濁衆生令離垢同證如來淨法身即起楞嚴咒念畢三稱摩訶般若波羅密上來現前清淨衆發菩提心各用虔誠諷誦如來妙良因酬天地謝龍神祝讚皇王萬萬春父母劬勞法界冤親三途八難出迷津消災障保安寧以此功德普回施利羣迷免災危四恩三有證菩提摩訶般若波羅密世尊降誕功德文疏奉佛遺教慶誕集福比邱某具疏大清國鄉貫同前秉佛慶誕供聖集福比邱某某洎合山清衆恭專情旨伏為于今年月日恭遇本師釋迦如來降誕之辰常住營備香花燈燭茶果珍饈以伸供養謹集合山僧衆就于大雄寶殿啓建誦經慶讚祝延聖誕道場一會於中奉迎常住三寶剎海萬靈光降華筵作乎證明僧衆在壇唪誦大乘妙法蓮華尊經全部加念十般祕密神咒稱揚聖號化貢雲馭金資所集洪因總伸回向真如實際莊嚴無上佛果菩提祈禳南無本師釋迦如來十方三世一切諸佛大慈悲父靈感觀世音菩薩次伸祝貢光明會上護法列席諸天大權仙衆統三界若幽若顯格十方乃聖乃凡功德平等資培善利普皆饒益先願皇風永扇帝道遐昌佛日增輝法輪常轉次冀山門鎮靜內外咸安火盜公私諸緣吉慶更冀現前衆等修行有序進道無魔般若智以早明菩提心而不退四恩普報三有均資法界衆生同緣種智謹疏華嚴文疏宣疏起頭佛身充滿於法界普現一切羣生前隨緣赴感靡不周而恆處此菩提座佛之聖德難盡讚揚香烟起處灌滿娑婆奉據一四天下南贍部洲大清國云云稟釋迦如來遺教植因比邱某某洎十方衆信士某某是日沐手焚香一心歸命十方靈相千光遍照之慈尊一字法門萬行莊嚴之海藏如象王回金剛心之大士真獅子吼逝多林內之比邱仰瀆蓮眸俯彰蓬悃伏聞舍那法身若雲興而彌淪大地華嚴乳味似日升而光照高山塵說剎說以何窮事遍理遍而無盡七處九會共演圓乘四分五周同敷妙義字字而金聲玉振言言而璧合珠連空金剛之種究而穿腸誠菩提之根頓能作佛意者伏念衆等根類敗噍器惟汙雜蒙荷佛慈尚次僧列仰惟三寶大矣難酬宏賴四恩淵哉罔報憾白業之無成悔素餐而有愧由是卜於年月日謹集合山僧衆祇就殿庭誦持大方廣佛華嚴經一期專伸祈禱南無華嚴教主具大智海興大慈雲毗盧遮那如來南無甚深法性所流圓滿修多羅龍宮上中下三本諸華嚴經南無一一塵方佛會中普賢文殊等諸法身大士信住行十地等妙諸大菩薩摩訶薩南無三界九有城林水火日月風雨藥草河海晝夜諸器世間一切護法神祇護世四天所領八部大力等衆南無表法最勝前隱後顯六千大比邱僧善財童子及童子南詢諸善知識南無結集今經文殊阿難恆沙菩薩羅漢及後世龍軀菩薩晉唐譯經尊者帝心大師雲儼大師賢首大師玄通大師清涼國師圭峰禪師長水祖師晉水法師再光法師金碧禪師廣及法界一宗諸大和尚統上若權若實維聖維凡同鑒精虔共錫祐庇上祝皇圖永固帝道遐昌佛日增輝法輪常轉伏願諷經弟子某等信為初步即五根而超十地之階證作終途就一生而曠劫之果次冀山門鎮靜擬磐石之奠安海衆柔和若緇澠之涽合檀那來布金之長者浮圖出多寶之如來佛光之內恩有齊資性海之中等無不拔謹疏四月十五日結制啓楞嚴會疏大清國鄉貫同前稟佛遺訓比邱某某茲今於年四月十五日恭遇本師釋迦如來大和尚結制之辰本寺啓建楞嚴勝會九十日一衆勳修刻期取證今辰開啓常住營備香花燈燭茶果珍饈以伸供養謹集合山僧衆登臨寶殿諷誦大佛頂首萬行楞嚴神咒稱揚聖號所集洪因端為祝延今上皇帝聖壽無疆專伸回向真如實際莊嚴無上佛果菩提祈禱大慈悲父靈感觀世音菩薩次伸祝貢光明會上護法列席諸天大權仙衆滿空真宰三界萬靈十方賢聖今年歲分主執陰陽權衡造化賞善罰惡幽顯靈聰五嶽四瀆名山大川聖帝明王忠臣烈士五方行雨龍王六合雷公電母主風主雨主苗稼穡發生萬物無量聖賢省府縣城隍主者當境貌廟遐邇神祇當田土地護教伽藍合堂真宰監齊使者水火井竈神君田園土地山林界相守護百靈修造方隅禁忌神將合山僧行本命元辰十方檀信運臨星斗各人生身父母養育劬勞酆都界內冥府十王三途八難六道四生諸有情衆統三界若幽若顯括十方乃聖乃凡功德平等資培善利普皆饒益先願皇風永扇帝道遐昌佛日增輝法輪常轉次冀山門鎮靜內外咸安火盜公私諸緣吉慶更冀現前衆等修行有序進道無魔般若智以早明菩提心而不退四恩普報三有均資法界衆生同緣種智謹疏七月十五日蘭盆會榜文大清國同前某寺住持沙門某某等為蘭盆普渡幽冥事伏以諸佛心內衆生結法界升沈之業衆生心內諸佛興蘭盆普濟之慈由一念之悟迷成三途之苦樂刀山劎樹皆成等正覺之場寶地玉階乃飄墮輪回之域切思衆等夙生父母及現世父母師資檀度恩有冤親四生六道諸惡趣中受苦衆生莫由解脫於今七月十五日恭遇本師釋迦如來歡喜之日僧伽自恣之辰目蓮教啓地獄門開凡本寺僧行須於預日諷誦經文神咒懺法俱各詳明填注己名粘列于左以便回向佛菩提普度河沙孤魂等衆為此諭衆通知須至榜者告許伽藍神疏大清國同前伽藍下居住稟佛遺教告許比邱某等稽首焚香恭通情旨伏為茲今年月日住持入院之辰思念一載之中公私幹辦全憑神力以維持動止安詳咸藉諸天而保護若非懇願何由聖力以冥加是以謹發誠心恭詣護教伽藍案下告許大乘妙法蓮華尊經部用作匡扶自陳之後伏祈佛天聖力保佑山門鎮靜僧行安和外障無侵內魔不起公私兩利火盜雙沈四時無懺芥之災八節有泰來之慶凡在時中悉賴帡幪之至供聖大意稽首金色大教主巍巍三教法中王九修福慧正菩提端坐紅蓮花一切佛之聖德難盡讚揚今以斯時當日輪祝午之期乃佛天受供之際營供三德香齊修奠六和僧福命我等誦妙伽陀加持香水灑穢為淨變少成多達長河為酥酪遍大地作黃金貢以金錢贈之寶馬以是因緣一切回向常住佛法僧三寶包羅天地水萬靈聰惟願千尊同一供萬聖同一筵香齊香饌悉莊嚴諸佛諸天咸集會上天下地平等資培萬聖千賢普同供養祝祖咒食文一軀沈巨海片月落長空世相皆如是浮生一夢中說斯經偈仰悼吾宗陰中享鑒奉據某府某縣某寺某房居住稟佛祀祖沙門某某洎合房徒孫衆等恭伸情旨伏為茲今年月日恭遇令節之辰思念祖宗遺蔭之德常懷報薦之思由是發心營備香供之儀僧衆上來持奉某經某咒宣揚聖號化煉冥用資財咒變現前法食所集功德先伸投入阿彌陀如來願性海中出生妙利端為莊嚴祠堂之內諸位覺靈承此良因早生佛界證大菩提次願花開蓮現見自性之彌陀花謝蓮成了惟心之淨土恭請三寶證明表宣謹意上陳文意宣讀已周薦悼祖宗悠悠樂土十方云云大殿回向文玉毫騰輝金色炳耀具大人相號正遍知瞻之仰之福滿沙界讚歎相好恭惟彰明今據大清同前某寺住持某伏值歲旦令節之辰常住營備香花燈燭茶果珍饈之儀以伸供養雲集合山僧衆諷誦大佛頂首萬行楞嚴神咒稱揚聖號所集殊勳先伸回向廣大真如實際莊嚴無上佛果菩提大慈悲父靈感觀世音菩薩諸大菩薩聲聞圓覺一切聖僧西天此土厯代祖師光明會上護法諸天大權真宰三界萬靈十方賢聖杭州府主城隍當境土地一十八位護教伽藍合堂真宰護法韋馱尊天大權修唎菩薩統三界若幽若顯遍十方乃聖乃凡功德平等資培善利普皆饒益先願皇風永扇帝道遐昌佛日增輝法輪常轉師長父母過現咸安信施檀那俱增福壽合院僧行修行有序進道無魔聞思修而漸漸增明戒定慧而重重光顯四恩九有等報三途八難遍資廣及法界有情同圓無上種智歲旦大殿誦楞嚴神咒畢舉此畢急念大悲咒一遍慢行念三遍又念消災咒三遍維那入伽藍殿內舉神靈赫赫云云祈子文疏伏以普陀育秀大士澤遍人寰法相鍾靈定光譽騰梵剎檀信對香幢而發願緇流展貝葉以行誠戴錫寧馨丕承光顯茲以信官士碩彥浙水名門道通三教簪纓繼武于鼎臺學富五車翰墨分輝于星斗斯固回文心既倒之瀾政治砥中流之柱者也夫人世系齊姜匹諧秦晉纓絡繽紛夙具前身菩薩笄珈燦爛獲配現世宰官百尺樓頭日日齊眉舉案六橋堤畔年年並轡聯鑣藍田之合璧連城洛浦之雙珠照乘貴皆有種福豈無因獨瓊英吐萼已開嶺上梅花金粟飄香未舉月中桂子雲居久蒙護持夙承捍衛白太傅結社香山奚止醉歌之達蘇眉山契心佛印豈徒文字之禪既立標準於前徽必振箕裘於奕竊惟諸佛六合咸其神化四生倚為覆幬虔卜良辰敬集法侶合掌某某山房稽首觀音寶座自古龍生龍子鳳生鳳雛皆自善緣發出則今相門出相將門出將必由勝果結來惟冀天上麒麟望德門而啓瑞人間鸑鷟擇仁里以呈祥不惟廊廟列為圭璋即精藍亦藉為屏翰人天共護福德並隆謹疏聖水寺志補遺書已成帙易來掛漏之譏事有可觀用增縹緗之富況乎名勝之地實多異見新聞而且說法之場不棄片言隻字散金碎玉皆生色於琳宮集錦鋪裘每重煩于毛穎私幸咨諏幾遍留存於里歌巷舞者之必收猶慮耳目難周湮沒於荒烟蔓草者之不少志補遺佛牙贊大宋紹聖改元甲戌歲乙亥月宋仁宗神文聖武明孝皇帝製三皇掩質皆歸土五帝潛踪已化塵夫子域中誇是聖老君世上亦言真埋軀只見空遺冢何處將身示後人惟有吾師金骨在曾經百鍊色尚新厯代祖師幻公法語數則世尊教外別傳脫略義解之大旨二十八傳而至菩提達摩大師是為東土第一代禪祖初師觀東震旦人有大根器乃越重溟三周寒暑以梁普通七年抵金陵尋往少林居九載得可祖領荷心法已而翩翩隻履復返流沙五傳至黃梅而橫出牛頭一枝六傳至曹溪則有南嶽青原派而為二自南嶽青原而下宗而為五南嶽出馬祖祖出百丈丈出黃櫱櫱出臨濟濟以金剛王寶劒之喝雷轟霆震不容掩耳別傳之道由斯而盛濟十七傳而至仰山雪巖巖授先師高峰和尚達磨一燈四傳至大醫則有牛頭一宗五傳至大滿則有北秀一宗六傳至曹溪而下又出青原南獄荷澤此三人者不可得而混焉智覺禪師明本明本號中峰錢唐人住雁蕩村姓孫氏出家吳山聖水寺聞高峰原妙禪師居天目山往叩之一見歡然剃染于師子院遂契妙旨與斷崖義公俱為高峰座下或問優劣曰義首座固是根老竹其如七曲八曲惟本維那卻是竿上林新篁他日成材未易量也元貞間高峰將遷化以大覺禪寺相屬辭推第一座祖雍主之登皖山遊廬阜至金陵結菴廬州辨山及平江雁蕩已而還山領師子院宰相大臣以五山主席交聘俱力辭因日避走南北間朝廷聞其名特賜金襴伽梨衣進號佛慈圓照廣慧禪師欲召見闕廷終不一至惟再封香下詔即所居修敬而已至治三年八月安坐而逝世壽六十有一僧臘三十有七文宗敕詞臣製碑諡曰智覺塔曰法雲有中峰廣録三十卷元統二年詔收入佛藏藝文監丞揭徯斯為之序謂其提倡激揚如四瀆百川千盤萬轉衝山激石鯨吞龍變不歸於海不已其大機大用見於文字有如此者中峰屢辭名山屏跡自放時住一船或僦居城隅土屋若入山脫笠即結束茅而棲俱名曰幻住自作幻住菴記其居東林也趙學士子昻馮學士海粟為之躬運土木以執役初子昻與中峰為友海粟甚輕之一日子昻偕中峰往訪海粟出示梅花百韻詩中峰一覽走筆和之復出所作九字梅花歌以示海粟竦然遂與定交昔者吾佛棄萬乘之權而受擯辱於匹夫之手捨海宇之富而丐衣食於域內之民忘宮室之華而委形質于草木之下泯道德之貴而厯辛苦于塗炭之中六年之間忘形凍餒卧冰齧櫱乃有夜覩明星之悟自佛以降西天二十八祖皆巖棲穴處或混跡於差別門頭以真心不泯實行無差皆克證已功傳師心印及達磨東邁百丈未生牛頭橫出一枝南北宗分兩派皆腰鐮荷鍤火種刀耕執爨負舂鶉衣丐食鐵石身心冰霜懷抱以佛祖大事因緣一肩負荷了無畏怯蓋行處即親所到必的矣彼時安有五山十剎之廣居三玄五位之奇唱放收殺活之異作拈頌判別之殊音不加雕琢而玉本無瑕安用規模而眼元自正自百丈建叢林已來廣田大宅指顧如意其奈正因日墜謬妄日滋紀綱日繁禮義日削數百載前提唱之師如臨濟德山雲門真淨氣憤憤地怒罵諸方如淫女兵奴視之蓋責其不體道本惟務言通互相欺誑者也已而閒有眼目定動之師喻諸方說禪如葉公之龍趙昌之花然葉公趙昌已自不真矧乎復有效葉公趙昌者出烏焉成馬之歎正不在今日也儒之道治心者也修心者也佛之道明心者也悟心者也治與修漸之之謂也明與悟頓之之謂也心一也漸頓之途不可以一者蓋住世間出世間之異也使吾佛言入世之道亦不忘正心誠意之說也使孔子言出世之道則逆知其不能外吾心空圓覺之旨苟不達聖人垂教立化之大權則徒事訩訩之多言惟憎其是非耳治世間書道德仁義禮樂刑政八者皆不能外吾一心之妙用也心通之謂道心正之謂德心慈之謂仁心平之謂義心中之謂禮心和之謂樂心直之謂刑心明之謂政以至百千萬行凡有利天下而澤斯民者未不因吾一心妙用之所著也凡夫反是而失其妙用則顛倒錯亂由之而生焉故聖人不得不設教以裁之也或問禪稱教外別傳果有別傳之理否每見義學紛紛於此不能無議幻曰義學以分別名相為務而於此不能盡分別之理使盡究其極則於別傳二字當一笑而釋矣何則夫四宗共傳一佛之旨不可闕一也然佛以一音演說法教中謂惟一佛乘無二無三安容有四宗之別耶謂各擅其專門之別非別一佛乘也譬如四序成一歲之功而春夏秋冬之令不容不別也其所不能別者一歲之功也密宗春也天台賢首慈恩等宗夏也南山律宗秋也少林單傳之宗冬也就理言之但知禪為諸宗之別傳而不知諸宗亦禪之別傳也會而歸之密宗乃宣一佛大悲拔濟之心也教宗乃闡一佛大智開示之心也律宗乃持一佛大行莊嚴之心也禪宗乃傳一佛大覺圓滿之心也猶四序之不可混既不可混非別而何或者謂彼三宗皆不言別傳惟禪宗顯言別傳者何耶對曰理使然也諸宗皆從門而後入由學而後成惟禪內不涉思惟計度之情外不加學問修證之功窮劫逮今不曾缺少擬心領荷早涉途程脫體承當翻成鈍置誠別中之別也彼按圖索馬者烏足以知之聞吾禪有教外別傳之說無怪其驚且駭矣古人參禪用一番苦工只如六祖到黃梅但令槽厰去溈山在百丈會中充典座楊歧十餘年惟總院事演祖於海會充磨主雲峰之化緣雪竇之持淨慈明參汾陽惟戲笑譏訶黃龍扣慈明惟遭詬罵南嶽磨甑青原垂足總之當人正因炳煥斷一切偷心識情之妄任其異境紛如一一消歸至理又何所往而不與道相遇哉五宗公案各有不同者乃語言機境之偶異耳如溈仰之謹嚴曹洞之細密臨濟之痛快雲門之高古法眼之𥳑明各出其天性而父子之閒不失故步語言機境似相蹈習要皆不期然而然也使當時宗師苟欲尚異其自為一家之傳則不勝其謬矣然公案通則情識盡情識盡則生死空生死空則佛道治矣夫公案即燭情識昏暗之慧炬也揭見聞翳膜之金篦也斷生死命根之利斧也鑑聖凡面目之神鏡也故凡通語言文字而不知佛道內典者謂之聰明外道方外知佛道而不會參禪者謂之墮落衆生昌黎韓公唐之大儒也以不知佛氏之教有補於治道發為詞章而詆訶之逮遇大顛固心降之其譏毀之聲斑斑見於𥳑牘柳子厚與之同時亦以文鳴於世作諸佛祖碑碣發揮佛氏之學雖非極至初未嘗效韓之詆毀也宋歐陽氏出文章宗韓作本諭以拒佛謂攻之愈堅撲之愈熾而不知有不可攻不可撲之大本於其間徒訩訩多言又何加損於吾佛也明效和尚著書非韓非非韓也乃諭歐也後儒相倣效詆佛者頗衆吾教之士往往謂彼嫉佛余謂彼非嫉佛也實不知佛也使彼知之則將外護之不暇雖强使其詆毀寧無愧於中乎復以因緣果報言之亦可以收謗矣如佛纍遭提婆達多以惡計陷于死地而不動念者乃知其有宿冤也當其狹路相逢返觀報盡還無之理如飲甘露又何念之可動哉韓歐之怒排力詆又安知其非提婆達多之餘蘊未消者乎但堅持正念待彼之餘蘊消盡則逆耳之聲將不求息而自息矣永嘉謂從他謗任他非把火燒天徒自疲永嘉之說雖盡善惟從他任他似亦未能當念融化之也靈芝照云取文中子何以息謗曰無辨謂嘗事斯語矣且無辨與從他任他之語然亦俱未盡理也故圓覺謂若知我空無毀我者則從他任他以至無辨贅且剩矣嗟乎近代之持公論者不鑑其本見彼斥為異端我亦非彼為外道與閭巷倚門而相罵者無異又何以表無生慈忍之力因緣果報之理哉昔有國王放五百醉象害佛佛豎五指迎之象皆馴伏時阿那律見佛五指端各現金毛獅子時一弟子白佛云嘗聞佛說此身如夢不可愛樂今現獅子之威禦醉象之難豈非愛樂其夢中之身耶佛曰我有何心於禦象哉我積劫以來修慈忍三昧今豎指入此三昧任其踐害以我三昧之力成熟故獅子之威不期自現觀佛之說乃禦難息謗之第一義也語言云乎哉機智云乎哉又世有所謂見德人之容使人意消心醉德人豈亦使之然乎期亦禦象難之浙也或不爾者皆自召也苟欲以語言言息之適滋之耳何益哉昔馮給事有偈云公事之餘喜坐禪未嘗將脅到牀眠雖然現出宰官相長老之名四海傳又李駙馬有偈云學道須是鐵漢著手心頭便判直趨無上菩提一切是非莫管又龎居士云日用事無別惟准我自偶諧頭頭非取舍處處沒張乖朱紫誰為號邱山絶頂埃神通及妙用運水與搬柴又張拙秀才云光明寂照遍河沙凡聖含靈共我家一念不生全體現六根才動被雲遮斷除煩惱重增病趣向真如亦是邪隨順世間無罣礙涅槃生死等空花又趙清獻公有偈云默坐公堂虛隱几心源不動湛如水一聲霹靂頂門開喚起從前自家底如上士大夫皆是不離功名富貴游戲大圓覺場豈古人獨能而今人獨不能耶惟在信之深行之力則古今可以一致更惑躊躇乃自畫之耳山可移也方可易也一定之業不可逃也所報之業有曰善曰惡而已善則報之以福惡則報之以禍福與禍雖不同咸屬報緣同名業耳業之定分如行路之遇境也三十里一橋五十里一店行至所期里數而橋店在焉雖聖賢莫之能避夫善惡之念不從天降不從地出一由迷妄之情自結縛耳通於三世貫以多劫因緣會遇福也禍也猶三十里之遇橋五十里之遇店絲毫不可易也世人徒見仁者天暴者壽逆者吉義者凶豈知其作於昔而受於今作於今而受於後惟恐不作安有不報而受之也故聖人不怨天不尤人良有以也昧者怨天尤人實不知其出於己也龎居士謂于頔侍郎曰但願空諸所有慎勿實諸所無此二語是入毗耶不二法門之要徑是轉諸祖向上關棙之玄機既不可以事說尤不可以理論更不容以義解也惟親到大休歇大解脫田地者如兩鏡相照直下無毫髮隱覆真所謂超言象越格量透情塵沒窠臼底最末後句蓋盡得諸祖不傳之祕乃發機如是之準的也幻住菴歌幻住菴中藏幻質諸幻因緣皆幻入幻衣幻食資幻命幻覺幻禪消幻識六窗含裹幻法界幻有幻空依幻立幻住主人行復坐靜看幻花生幻果放還收控勒幻繩騎幻牛時或住八萬幻塵俱捏聚時或眠一覺幻夢居四禪有時動幻海波翻幻山聳有時靜幻化光中消幻影可中時有幻菩薩來扣幻人詢幻法我幻汝幻幻無端幻生幻死幻涅槃淨名室內龜毛拂龍女掌中泥彈丸更有一則幻公案幻證幻修須了辦莫言了辦幻云無只此無無名亦幻學人未達真幻輪動轍身心自相反幻心瞥爾生幻魔幻翳忽然遮幻眼陽焰空華乾闥城天堂地獄菩提名有問此幻從何起雲月溪山自相委要見菴中幻主人認著依前還不是九言梅花詩昨夜東風吹折中林梢洞口小艇滾入沙灘坳野樹古梅獨卧寒屋角疏影橫斜暗上書窗敲半枯半活幾箇擫蓓蕾欲開未開數點寒香苞縱使畫工奇妙也縮手我愛清香故把新詩嘲次韻瀋王題真際亭按中峰行録云駙馬太尉瀋王王璋遣參軍洪鑰齎書幣敘弟子禮期請上命南來參叩己未秋九月王奉御香入山謁師草廬咨訣公要請師升座為衆普說師激揚提唱萬餘言王復求法名別號師名王以勝光號曰真際王因建亭師子巖下以託其事和詩云高亭結搆標真際體共雲林一樣閒山勢倚天忘突兀水聲投澗自潺湲伽陀逈出言詞外海印高懸宇宙間佇看憑闌人獨醒又添公案入禪關昔真歇和尚有偈云訪舊論懷實可傷經年獨卧涅槃堂門無過客窗無紙爐有寒灰席有霜疾候始知身是苦健時多為別人忙老僧自有安閒法八苦交煎總不妨古人作此偈傷身世之浮脆了夢幻之起滅指情妄之所緣示斯道之真寂五十六字網羅殆盡真道人之龜鑑也昔維摩居士謂無住為家舍大慈悲為父隨順菩薩為母柔和忍辱為妻智慧為子方便為奴婢送吉上人之江西下高峰和尚遺書寒巖一夜風雷惡獅子迸斷黃金索驊驑萬里追不回聲沈宇宙空山嶽今君去去持此音十八灘頭探麟角君不見馬師一口吸西江波騰浪沸烟茫茫又不見集雲峰下四藤條雨洗風磨恨未消生耶死耶俱不道鐵壁銀山齊靠倒有問禪血染溪花春正妍有問道兩岸夕陽帶荒草千差萬別任縱橫瞥轉一機何處討玄沙白紙脫或舉似時更須莫謗西峰好和皖山隱者野人原上十五里寒崖白日啼山鬼萬峰重疊路回旋半閒箬屋青松底老僧和鍤入烟霞滿林遙落朱藤華燒田種寒粟斸地栽胡麻雲根撥筍澗底尋茶糞土深埋魁芋種砂瓶爛煮黃菁芽人謂隱者閒不足何故山翁事驅逐山翁笑指溪上花庭前竹春風幾度更新緑香巖不作靈雲死徒有是非喧兩耳爭似儂家百不知從教少室分皮髓少林初祖揚子江心波少林峰頭月寥寥一片心直指成曲折謂其有傳兮胡為壁觀九年謂其無傳兮因甚麼花開五葉秋山木落猿晝啼行人眼底流鮮血大鵬展翅取龍吞一攪滄溟徹底渾觸破珊瑚枝上月至今千古暗昏昏布袋兜率天宮降人世忘卻當來下生記閒家潑具有許多勾引兒童恣遊戲袒肩赤膊當神通揚眉瞬目稱三昧奪將拄杖劈頭揮一齊趁入龍華會黑拄杖橫挑布袋轉頭忘率陀天茫茫不顧肩頭重猶要逢人乞一錢臨濟𡎺三拳於大愚肋下將虎須於黃櫱面前肆一喝如雷砰霆震搖寸舌似電激雲奔掣風顛漢世希有普天匝地皆兒孫趙州高麗僧請贊腦後萬莖雪面前三尺霜肚裏直儱侗語下絶囊藏勘破臺山婆子大坐平欺趙王萬里海門攔不住遠遺清影過遼陽我只喚作三百年浸漬不朽底陳爛葛藤椿試將此語傳諸方贊潤齊心如鏡明齊如掌平克己之功惟尚其實活人之道乃存其誠按六脈決中其的使二豎畏聞其名圓陀陀地神通手堪與毗耶把臂行詠葫蘆秀結團欒帶晚秋偏從根本易綢繆牆頭髣佛懸明月架上依稀綴碧旒漫隱神仙三島飯隱乘羅漢五湖遊將來剖破成雙器半贈顏回半許由松月天有月兮地有松可看松月趣無窮松生金粉月生兔月抱明珠松化龍月照長江松掛衲松同禪定月當空老僧笑指松頭月松月何妨一處供自讚幻人無此相此相非幻人若喚作中峰鏡面添挨塵墨痕灑袈裟筆花點精神展向掛空壁日日生陽春又我不是渠渠不是我物外變通目前包裹閒雲居此幻住身狹路相逢來合火咄咄咄我我我是甚麼一天星月影團團萬疊湖山青朵朵又虛空有體貌牆壁具耳目惟有這箇漢完全離背觸喚作幻住漚華翻性海之波謂非幻住陽焰轉識曰之曲不墮兩頭如何付囑常憶開沙十萬家錦團團兮華簇簇又咄哉此僧有甚巴鼻大坐胡牀全無義味談禪禪不曾參論道道非所契以茫茫業識當參學眼睛以擾擾幻緣為平生住計有時橫孤舟於青莎白水之上笑船子便棄渾身有時撥魁芋於寒灰冷火之中笑懶瓚不收殘涕千手大悲推不向前八臂那吒捺不入地盡指南閻浮提喚作西來祖意只如斯鹵莽為人如何做得他徐十三郎之後裔又遮呆漢只好看殺有丰姿全無氣岸謂知道不明本地風光謂會禪罔測古人公案最無分曉處佛祖爪牙極有來由時鬼神茶飯從來伎倆只有斯一字如何可加讚又寂而照鼻無兩竅照而寂家無四壁見得徹處領下眉長靠得隱時機前意的鐵如意擊珊瑚枝稱鎚揑出黃金汁匡牀坐看北庭花春風處處成狼藉佛印璵禪師贊明釋德洪覺範臨濟正宗有楊岐會化四十年叢林精彩唯端精神辨博無礙克肖其家溈仰猶在後出舒勤骨面氣概始自太平遂遊智海如法中龍遊戲三昧璵也其後斫額前輩要識當年栗棘蓬白藕火中香不改淡憨道人周初平百忍說忍之為德其至矣乎樂天知命忍之原也懲忿窒欲忍之方也天道虧盈而益謙人道惡盈而好謙鬼神害盈而福謙謙即忍之旨乎忍為德行之本忍為聖賢之基忍為豪傑之用故君陳篇云必有忍乃有濟有容德乃大孔子云齒剛則折舌柔則存柔必勝剛弱必勝强好鬬必傷好勇則亡百行之本忍之為上是故不得為已甚聖而忍也犯而不校賢而忍也不報無道強而忍也慮以下人達而忍也仁者其言也訒言可不訒乎動心忍性益所不能性可不忍乎羑里文王陳蔡孔子忍不可忍之患難簞食顏子鶉衣原憲卜商忍不可忍之困窮其守己也忍餓于嗟來黔婁忍渴于盜泉孔子其篤學也忍痛于刺股蘇秦忍寒于立雪游酢楊時夷齊餓首陽為義而忍薛包勤灑掃為孝而忍寇恂屈賈復為忠而忍子卿甘嚙雪為節而忍險阻厯國文公忍而霸晉卧薪嘗膽句踐忍而沼吳屈體鴻門沛公忍而蹙項濳泣枕畔光武忍而興劉子房忍圯上王孫忍跨下夷吾忍檻車師德忍唾面劉寬忍污袍王旦忍墨飯終身讓路朱仁軌之忍也遜謝叩馬李文靖之忍也大耐官職向敏中之忍也污卷自陳夏原吉之忍也折節受侮公瑾能忍讓溫克不怠康成能忍度屈己抗禮鄭公能忍貴六院同庖君良能忍義無地起樓臺萊公能忍儉若夫忍嫌于秉燭關公忍捷于圍碁謝安忍功于大樹馮異忍主于道梨許魯齊忍訴于射牛牛宏忍屈夷門而救趙信陵君忍恥飯牛而相齊寧戚忍乞吳市而覆楚伍子胥忍事女主而反周狄仁傑忍之為用其大矣哉明此忍則客纓可絶楚莊王明此忍則帝足可躡張子房明此忍則葅蛭可吞楚惠王明此忍則寶盤可碎裴行儉明此忍則巾幗可不恥司馬懿明此忍則袖釧可不問彭思永是故我舌尚存毆亦忍張儀佯死棄厠辱亦忍范睢不欲知名毀亦忍呂蒙正驢首署名侮亦忍馮道諸葛瑾償同舍金誣亦忍直不疑認馬不爭妄亦忍卓茂髠鉗自貶奴亦忍季布梁上君子盜亦忍陳實孟德憐才則忍陳琳之檄狄青克己則忍劉易之詬袁盎恕吏則忍侍兒之私賴此以脫吳難馬翁恤下則忍斃兒之誤生子森為狀元跪而結襪釋之忍下賢也失印自如晉公忍變故也繫獄讀書楊溥忍縲絏也遇刺不驚魏公忍授命也韓琦不究竊器齊賢以忍容人也不認原金知常以忍全交也先嫁令女鍾離瑾以忍恤孤也焚券擇配竇禹鈞以忍宥過也五子皆為顯官人情最難忍者色與財若靳翁之踰垣避女子文僖為宰相馮商之還妾贈金子京為狀元曹鼐之書名自戒後為狀元羅倫之拒女奔樓後為狀元是能忍乎色者林積之約主還珠子德新為尚書高翁之捐金完配子銓為尚書朱軾之代完青苗三子皆顯官舒翁之館資救婦子芬為狀元是能忍乎財者由是觀之自帝王以至卿相自豪傑以至聖賢未有不得力于忍者也是以君子忍人所不能忍忍人所不堪忍忍人所萬難處之忍如冰之忍凍而益堅如金之忍鍊而益精如松之忍寒而益徑忍之為德至矣庸夫不明此忍則為暴戾為橫逆為作亂莫大之禍皆始于不忍可不戒歟噫張公藝所以有百忍之規余因以自警為之廣其旨云修雲居記許時若鳳山舒翼南入會城首萃於雲居昔人以其位為離也因顏其寺聖水所以制亢濡不及也然自前明再劫及今六百有餘年再創在明時萬曆二十八年抑在本朝康熙五十七年為大風摧折而佛印吟廊中峰遺履依然如故無如舊址頽垣古松敗壁已岌岌不支吾郡大章金公嘗為長沙司馬暮年養病歸里遊憩湖山閒往往屐齒芒鞋尋復故址尤愛雲居之幽邃慨然思整其制歲乙酉蠲資五百金與寺僧雲巢商搆於是剃草築堵拓其殿址繕其門楹今之過是寺也叟童薪牧聆山鐘之逸響披野蔓于朱宮咸得指而識之自是以往倘欲踵而增勝者豈非今茲葺助之力有以基于不壞耶是為記浙江巡撫都察院張公定案康熙四十三年三月初三日具控原呈為憲究捏名清界超冤事本年三月初十日奉巡撫部院批據僧人時中等呈詞開稱痛中等住持雲居聖水禪寺寺基坐落錢邑豐興坊內左右前後餘山通共一百餘畝自唐宋至今厯奉丈入魚麟官冊向係僧衆辦糧印票炳赤圍牆種蔬收花修葺康熙三十二年間蹇逢閫司工房范麗源顧朗耀等霹捏雲居山為閫司轅門照山種菜有礙風水誑稟前司熊差人到山盡將四圍牆垣折毀反差拿寺僧監禁勒餽方休弱僧無奈將屋變獻方釋至今不許種植蔬蕪樹枝被竊久難看守中等衆僧賠糧十有餘年飲泣無伸本年正月內不知何棍隱匿姓名捏造寺僧智明誑報閫憲奉批右衛經廳查審差喚驚奇因查各房並無智明已將飛誣供明在廳詳司日久司房又顯神通不但不究捏名又差人來取具看守結狀霹要中等添種楓樹但寺僧厯年賠糧困苦已極司房設計飛害弱僧粉骨難支況閫司照山原係王家山並非雲居山今王家山現有居民納佃種植軍民迥別與僧舍相去甚遠竊去細枝係僧辦糧産物並非王家山樹枝泣思賊竊樹枝與僧何罪捏名陷害不究司房權重如山哀叩憲天電察冤害苦情嚴究捏名翦蠹安良等情奉批都司查報都使司繆由詳文奉批該本司查得未奉之先本年正月草六日據雲居寺值年僧人智明呈為稟明事呈稱切照雲居寺後山楓嶺一帶樹木乃是都司老爺照山向蒙前任都司熊老爺查清立碑示諭一應樹木毋許砍伐照山楓樹有關風水遵法禁示並無砍伐傷枝忽于上年冬間有本寺西六房僧時中將楓樹砍伐數枝又將枝丫砍下二十餘枝恐干行查遺纍值年理合稟明據此隨批仰右衛經廳查報續于二月初七日據右衛經厯羅萬邦詳稱遵即查喚問據西六房僧時中回稱本寺並無僧人智明舊年值年係僧人時中今年值年係南溟房渭一當值並無砍伐樹木不知何人假捏智明係屬匿名等情據此卑職就經差役督著本年值年僧渭一細查去後復據渭一回稱各房並無智明出具並無智明如虛甘罪結狀現在并覆遵奉臺差各處看視並無砍伐止有三枝微損細枝八條餘無別情等情據此卑職就經當堂詢問本年值年僧渭一那智明果然各房沒有麼這砍的樹你不要代人隱瞞日後都司大老爺查出來責成下來要重處的據實說來回供那嶺上的樹內止有三枝的枝丫共盜去八枝有一寸來大的本身原不動的又問時中那智明你們講說匿名了那砍的樹是那一個砍的你既值年為何不報呢回供上年十二月原被人偷砍了七八枝是早晚偷去的僧人的寺離得遠難照管的又是小枝僧人不敢瀆報當初熊老爺立碑原開釋說不傷大樹若是小枝就罷了如今不知何人捏智明的名字來害僧人的等語據此該卑職查看得雲居寺時中乃去歲值年之僧也今年則易渭一據時中供稱係上年十二月被人竊砍小枝因前憲碑禁不許砍伐樹木未載小枝不敢瀆報之語則時中之不報俗情亦或有然其捏報之智明寺中確查並無其人將誰憑證以為自盜者懲則影射無端之事似難以坐時中也然時中係輪值之年理宜照料但離菴頗遠委係三枝樹木竊取小枝數莖非復巨木高枝聲聞倒砍為時中者或可仰邀憲恩原情寬宥併飭該僧以後無分枝幹嚴禁砍伐永遠培植據此本司批據詳時中供認被人盜去楓樹八枝則智明不為誣矣何得又以匿名為諉此乃慮及智明對質之計姑免深究仰押時中于山空之處栽植楓樹八枝以贖其罪再取合寺僧人看守結狀報查繳等情在案今奉憲臺批據僧人時中等呈稱楓嶺係有糧之地不是閫司衙門照山之語本司即令經承檢查照山卷案即據查出康熙六年李都司任內有王候毛榮佃種照山基地呈詞印案可據又有康熙二十八年熊都司任內有雲居寺僧真朗里書韓遇吉稟復楓嶺樹木數目及禁示印稿可據更有康熙三十二年熊前司取有照昻十二僧結狀及勒石碑摹鑿鑿可考并有康熙三十九年林前司飭禁印稿在卷除鈔録附覽外該本司查得楓嶺稱為閫署照山由來相傳甚久似難一時追遡其木根水源矣今就康熙六年暨二十八年三十二年三十九年李熊林三都司任內印卷碑摹而論是現在之憑據既真則從前之傳流諒非虛誕矣詎時中不理直于三都司飭禁勒碑之時輒欲混占于立碑十載之後若謂熊前司信任范顧二書不敢控究何不公籲于從前厯任院憲乎況熊前司于康熙三十三年離任林前司于三十九年出示嚴禁又何不將魚鱗官冊辦糧印票具控于憲轅乎乃竟默默多年全無一字展辨今乘智明稟報之後一旦誣陷于書辦歸過于本司不識是何意見或寺是僧非意欲各施佛法或誤聽教唆希圖總占照山前柔後剛令人叵測竊思宦遊地方衙署尚為傳舍何況一照山乎本司又豈可輕信浮言而與僧人爭一照山乎但從前卷案似不守泯本司愚懦亦不可欺惟將舊卷鈔呈詳請憲臺俯鑒酌奪是否本司淩壓僧人抑或僧人藐抗本司統候憲臺一判則如山之案定矣再查僧人智明據吏房書辦趙士昌回稱原識其人又名于南或係時中等暗令遠遊不出反作捏名以圖翻案更查此案承行係工房書辦賴兆榮並非范麗源顧朗耀本司亦未聽其設計飛害應否嚴緝另究伏乞憲臺批示遵行浙江巡撫都察院加五級張批照山樹木據控係僧衆之物該司不當過問若係該司衙門所植責令僧人看守借端擾纍不幾貽一地方之害乎今閲回詳並不平心靜氣細陳原委則該司之書役操權肆意妄不止一事為然可知矣仰將此山現在作何承佃辦糧之處逐一明白詳奪再勿洵混未便此繳都使司繆審後詳文為憲究捏名清界超冤事四月初七日奉巡撫部院批本司呈詳申覆雲居寺僧時中等呈控雲居山係雲居寺完糧並非都司照山等情奉批照山樹木據控係僧衆之物該司不當過問若係該司衙門所植責令僧人看守借端擾纍不幾貽一地方之害乎今閲回詳並不平心靜氣細陳原委則該司之書役操權肆意妄行不止一事為然可知矣仰將此山現在作何承佃辦糧之處逐一明白詳奪再勿洵混未便此繳奉此該本司捧讀憲批驚悚無地捫心自省蓋緣本司誤以厯任前司案卷為憑里老傳言為據遂將楓嶺認為閫署照山又因時中等將十餘年前之事一旦歸過本司是以鈔卷日月詳過于直戇此乃本司筮仕不經之咎已難自逭猶蒙憲臺恩批指南此又不幸中之幸矣今遵憲批本司傳集衆僧里書同往親勘見其照山石多土少楓樹羅列據時中等口稱此山自唐宋迄今俱係雲居寺承管問其憑據僉云並無又據里書朱鱗回稱係康熙三年丈量分立魚鱗圖冊三本民地一本軍地一本軍地撥入民地辦糧一本雲居寺坐落軍地撥入民地等語驗其來厯丈冊可稱由此推之是此山先屬于軍後撥于民地明矣但熊前司未察先軍後民之故惟認作為照山本司又以熊前司之碑卷作為信案唐突鈔詳此本司因其誤而誤之實非敢于洵混也今奉憲批仰將此山現在作何承佃辦糧之處逐一明白詳奪等因遵查此山既于撥入民地則應歸于雲居寺承管辦糧惟是嶺頭樹木栽植多年鬱鬱葱葱恐其遽伐不但留護閫署之風水亦可作為會城之佳氣可否免僧看守飭禁剪傷此又出于憲臺化及草木之仁矣再查時查原狀內稱書房設計飛害時中等十僧衆口同詞僉呼並末得銀取有十僧押結在案夫范顧二書既未得贓應否免議恩出憲批更查起釁之僧人智明前據趙士昌回稱又名于南遠出未歸除現在勒令尋覓俟回寺之日究明另覆本司未敢擅專統候憲臺俯賜鑒原批示遵行為此今備前由粘同原奉批詳理合具呈浙江巡撫都察院加五級張批既據聲明如詳銷案嗣後應歸寺僧管業聽其自便毋再借端擾纍致干察究繳凡本寺各房沙彌初進山門本師即同伊親戚或父兄當詣寺長處通知面會稽其來厯并白大衆可否收留以便登常住大簿分別尊卑凡遇祠堂祭祀各房學生應到祠堂禮拜祖先不到者每人罰錠五百有事遠出不在此例常住法産祖課向託主管黃在邦收管倘有私自下鄉竊契戤押串通主管私自盜賣者一經察出毋論尊卑立即擯逐鳴官存案盜賣之産仍歸常住此係至公之論永照此例元雲居寺中峰和尚札正月十九明本頓首再拜上福壽堂上山翁大和尚尊几明本自新春而來口欲上尊履之狀病衰日積殊切馳情即日孟春伏惟尊體起居納福邇者人自城中至傳聞和尚日昨有意外之擾又知所問之官皆故舊信吉人天相之也方欲拜問茲以中便武亟扶病上狀殊愧草惡大覺寺訟聲聞亦少寬但常住苦於戶役窘於債負一清如洗明本眼不耐見具述寺門之艱作一呈子上禮相之門以中能言其略和尚或會禮相之昆玉更望方便請其與之主維則大幸也餘不多及仰干尊悉不備明本頓首再拜上右石刻在雲居寺行書二十二行行字不等不知何時刻札中言寺中事書體頗清逸雄徑自成一家明本不以書名而天骨自具今寺中傳遺履長一尺二寸合觀此書足證其巍然龍象具體也貴池令近溪沈公墓志銘茅坤嘉靖乙卯豫以河南按察使司副使罷官歸歸而棲聖水寺同山人仕通政使馬公三才太僕卿沈公淮光州守高公冕輩為西湖社遊而吟當是時近溪沈公梅亦以第鄉試擯之南宮者且四按沈公嘉靖癸卯舉人而於馬沈兩公為同年也故亦囊詩筒過焉公性夷曠與人交無城府無坑塹間出舉子業讀之翩翩也已復三試南宮不第於是補博士出諭銅陵下帷帥諸弟子讐六籍及百家言譽望稍稍起直指擊校文他省公固辭未幾令貴池貴池吏民稔聞公之故諭銅陵風素也於是父老攜壺漿出迎公既至省供張絶饋遺邑之豪舉而骫法者稍芟剃之其他節冘費決滯獄平賦役刷庠序以循吏稱而按節使所擊而獎之者沓至然公淡宕而亢不善俯仰譽者什九而齮齕者亦什之一於是解綬棄官歸結廬於苕之上曰永安曰也足別卜築於北山中曰怡閒閉戶讀書嚮所共西湖社遊而吟者並凋落殆盡公猶數過聖水共豫徜徉泉石間按公所草西湖志多先輩聞見不逮其他近溪集併也足堂俚語苕上游詠西湖游詠與善惡報應録諸所手著豫間及覽睹而士大夫間亦數口賞不置嗟乎公抑詩所謂大雅不羣者已公生正德乙亥十一月朔日其卒於萬曆庚寅十一月十四日享年七十有六公自高祖進家世安溪里故號近溪娶周氏先公歿所生男三長汝忠邑庠生次養元太學生次汝誠蚤殤女二適德清庠生徐汝翼次適錢塘庠生薄元宰孫男三長懋禮太學次懋義次懋信孫女一適錢塘朱長治元孫四嗣賢嗣哲嗣科嗣登養元同兄卜以癸巳十月四日附葬公於聖水寺之東祖塋之麓來請銘銘曰公之少也鹿鳴於鄉兮文業其昌垂爾墨綬兮挂爾銅章公之晚也社游西湖兮矢歌其光煙霞痼癖兮泉石徜徉公之歿也豫題其墓兮呼為地下郎千斯秋萬斯兮猿與鶴其鬱相望重刊中峯和尚廣録序附刻徐一夔昔在大德延祐之間江之南有大和尚曰中峯本公居天目山發大願力具大辨才痛救末法之弊大機大用變化翕霍雷震電走如大醫王視一切衆受病己劇悉皆因其病而藥之故其所為書有曰信心銘闢義解曰㮙嚴徵心辨見或問曰金剛般若略義曰別傳覺心曰擬寒山詩曰幻住家訓曰山房夜話曰東語西話曰續集曰語録曰別録千言萬語反覆辨說無非隨機開示俾凡參學之士證上乘也總名之曰天目中峯和尚廣録和尚化去其徒表請於朝願如五季永明壽禪師所著宗鏡録宋明教嵩禪師所著輔教編傳法正宗記得賜入藏與內典並行朝廷允之鏤板於杭之南山大普寧寺未及廣布而數遭小劫板與寺俱燬有武辨之士曰張子華者善人也得其殘編讀之惕然有省於中曰和尚之言切實明快因事示理真對證之良藥若我之迷鈍且猶有所警發而況圓機之士乎吳山有雲居菴亦和尚法嗣所築也子華謀於其菴之上首智皓慧澤二師曰吾願重刊廣録以廣流通吾捐己槖為之倡師等皆唱其道者也幸助我募緣成之二師曰是吾志也時和尚之慈風被於人者未泯樂助者衆板材既具擇日命工以鏤刻焉逾年而功完請余為序嗚呼和尚之道大矣其見於虞文靖公集宋正獻公本所著塔銘與道行碑者備矣至於廣録入藏揭文安公曼碩又奉敕為之序顧余何敢追繼三公之後縱一言之其於和尚之道猶指虛空而加讚歎安能得其髣佛哉嘗試論之言禪不尚文字其來尚矣要之第一義諦非文字亦莫能以傳譬之涉長江大河非假舟筏之力未免望洋而退惡能濟彼岸故凡傳宗之家必有語録者此也夫文字者舟筏之具也何可廢哉方元室全盛之日崇尚佛乘前古未有有能續佛慧命大宏法量力尸化權普應十方而無礙者和尚一人而已當其住世王公貴人學士大夫以至遐陬裔域之長攀蘿緣磴隮千仞之巔瞻其光儀聆其謦咳得悟於一棒一喝之下固無資於文字及夫報緣已盡光儀不可得而見矣謦咳不可得而聞矣雖欲承其策勵邈不可得猶幸其應世之蹟見於文字者可以為究竟之地不然光沈響絶未有不舍正塗而趨邪道者此廣録之書所以不容廢也雖然能仁氏之道纍千萬億言至於無一言可說乃為大徹嗚呼是書也其大徹之門乎是故廣録之書完和尚雖已化去四衆持誦常如住世之日然則張子華氏有功於心宗之傳豈小補哉書凡三十卷字以枚數凡二十一萬有奇若其族出之懿承傳之的與其純德苦行之詳則有虞宋二公之碑銘在兹不著洪武二十年嵗次丁卯四月佛誕日杭州府儒學教授天台徐一夔序後序吾本師崙山公諱通淵海昌人也與懿原係同鄉本屬親串髫年時偕先君子讀書寺中一病幾危師以藥生懿之命病愈不願還家即禮崙山禪師為師師諷唄齊薰惠我三昧久之謂懿曰吾密印老祖云雲居宋元業醫衣鉢傳山今已披緇且指下活人與靜修並濟後嗣不能作人天師不妨精岐黃術因授之以醫經豫雖鏤冰伎短針血計疏然皆吾師之教也既而吾師跡寄林泉心超祇鷲復以中峰祖師梅花百詠及寺志一冊授懿曰數百年來失修舊矣開闢有自而顛未無稽只防山靈騰誚梅魂獻嘲亦傳應器者咎也豫聞言悄然而思竦然而恐曰唯唯懿雖不敏誓成師志顧其中有難為者剖心寡竅問不知三對面多牆書惟闕五則博采難家餘四壁貧似相如産僅十金業同揚子則工費難與李杜齊名者少願僑札交貺者稀則秉筆纂修者尤難具此三難志事不果古鐵王先生者東城名士也惠然來吾廬啜茗歡甚逡巡以志事就商先生欣然樂董其事雲飛壯思泉湧麗辭收闕文於百年捃逸韻於千載惜乎手筆未竟人琴俱亡志事復不果自是懿以山乘自前不復外索夫何郡伯嚴君薦懿為都綱辭不受强之再姑任之義在斯合道或可存然而喧囂犯慮倥偬裝懷時或有焉比年來以病免謝絶業塵打開緣障方克肆力于搜討追蹤乎清芬凡斯寺之所以興殿宇之所以存靈異之所以著更人物之可以傳詩文之可以誦自唐洎今都為六卷刊中峰祖師梅花百詠二卷復以實懿水明山樓集四卷附之肇以辛卯竣於壬辰嗟乎日遷月化吾師云遙雲散風馳王生不再踐在昔之宿諾成未竟之遺篇即或山寺容有變遷而斯志斯文庶幾不死作後敘乾隆壬辰歲二月十二日本山雲巢衲子實懿謹述幼讀厲太鴻與石貞石兩先生游雲居詩輒慕其勝咸豐戊午冬日獨訪山中寺之長廊已半欹斜佛屋亦多穿漏僧徒寂跡鐘魚稀音求觀麻履不可得但禮中峯髮塔摩挲梅花詩石而已越兩載猝遇兵燹淨域化城益不暇問同治庚午亂既大定偶偕陸點青竹舟兄登尋遺蹟叢木推殘楓嶺僅留一幹閒階遺礎碎無微塵雖點青少日屢遊之地欲訪鼓兒井所在亦四顧渺然蓋地接錢湖門庚申二月粵賊即從此穴洞燃藥轟裂城堞撲陷省垣寺正當其衝宜乎遭劫尤烈也相與感慨久之點青言寺故有志盍加訪求又數年得此志於海昌管芷湘處閲之有未盡者如明徐大章教授重刊中峯和尚廣録序中吳山雲居菴亦和尚法嗣所築張子華謀於其菴之上首智皓慧澤二師曰吾願重刊廣録幸助我募緣二師曰是吾志也時和尚之慈風被於人者未泯樂助者衆得以鏤刻至今印本尚傳而志中不惟失載此序即子華氏之為檀護智皓慧澤之為耆舊亦闕焉不書豈非數典而忘乎遲回又十年點青與竹兄墓有宿草而寺仍荒蕪恐并此志而失墜也因付梓人以永其傳且縮摹許邁孫所藏趙承旨繪中峯遺像翼助莊嚴其梅花百詠水明樓詩姑置緩刊工竟之時上距志成之嵗重周甲子法輪轉運默有微因嗚呼志既因妙運而復刊寺詎不得仗慈靈而復興耶謹識以竣光緒壬辰臘八日優婆塞丁丙
