body:
  text: 𧧌湛同明倫原輯通淵同實懿重纂贊偈古德有云臨濟溈仰諸大善知識皆具王公將相之材為法門梁棟今幻住老祖道超三乘學富五車龍象交參人天共仰一切製什如龍噴法雨潤澤羣生如鶴唳九霄沁人心骨誦讀之間疑有名花解笑頑石顛頭者皆從法海性中流出驚心駭目迥軼凡響古德之言誠不誣焉志贊偈大士三十二贊明本幻住萬象森羅文殊悟竅一亘晴空普賢心妙具是大德如青蓮華皭然皎然泥而不滓即佛離相衆生諸佛即相索佛諸佛衆生百萬億好大千威神能見是者不以目睛秉般若劍摧黑暗盡光明洞然行佛心令令行如焰無處湊泊鋒鍔未露天魔膽落明月一圓清風兩袖笊篱笊篱雖工莫售莫信者何勞心碌碌譬動水珠竟無撈摸龍性難馴驚雷駕電仰菩薩慈朝參暮見脫旁生趣成正覺緣念念道德塵塵行遍彼賣魚者一錢二尾踏破指頭白晝見鬼隱菩薩身化童女貞非大悲心著甚死急猛子求道渴龍卻海菩薩何求清淨自在乘其背項游戲無時龍以渴故亦總不知衆生熱鬧熾然若甑得楊柳水一滴消盡我四大中觀空亦多云何無明但滋愛河浮圖寶級縱廣百萬以自在力指掌可玩衣裳離披龍鬐鳳毛游行去來八荒九霄海月流光天雲弄影縹眇玉局展普門品轉轉不已喃喃自喜云何自持反求諸己飛鳥拍肩蹲蹲將及正未及間狂心頓息天和氣薰小雨沾裳浮雲柳絮空闊飛揚日映海中紅光赫奕百怪潛消天吳盡泣一回顧問千里瞬息汝唾露中亦有是日琉璃瓶中滿貯甘露灌我頂門透心溢腑小童無知問師乞取師言何用此惡毒水海音轟雷浪花捲雪彼大士者飄然一葉此非因緣非自然相欲尋明月在爾指上婉矣大士為女為男男女二相了不可拈皤然老翁為人為天惟天與人同此法緣有經二函置之石磴未展一葉意義已盡彼又云何如恆河沙遍入沙際在一剎那宇宙昧昧大被長枕舉世齁睡呼之不醒以彼夢機投我夢說實知夢者眼未嘗合珠網金絡光芒亘起我比蓮華不捨不取離取捨相兩頭誰倚昨夜江邊一天春雨形體變幻神通妙有我趨亦趨我走亦走或攜之前或攜之後前後兩際不可意逗娑婆惡濁如大苦海菩薩安然得大自在乃知沸鑊自有清涼雲眸旋月雨花生香師獵得麕師農得粟善財立泣禮菩薩足菩薩不定前瞻後矚汝自問取白雲青竹菩薩化身并化是石情是無情同是幻質既隨化生亦隨化滅是故佛言一法不立維獅子王駿不可沮領鬣風生鼻端出火道人行徑狐縱歸族發勇猛時劍心瀝血華鬘瓔珞具種種好因好生愛妄想顛倒顛倒百變煩惱境現諸善男子莫作是見侗侗貿貿隨落坑塹舒母陀羅光輝爛爛地無險平而差趨蹶沒巴鼻中婆心正切抱几南坐為默為說為是說者不涉口舌若名為默彼意了然切不可說非默非言桓桓武人犀顱虎髮負法王子雲蹇霧發仰之瞻之邈彼天外回兮旋兮近我衣帶珊珊鬱鬱風踞灑然草蔓枯石雲飛高天昨夜大士入我夢來醍醐一滴心花自開俯首瞷月愛而忘歸江風水露助其清暉試觀我心一塵不染萬古寒潭光明洞遠彼佛儼然不起於位合掌向佛開掌即背開合總然向背不涉石獅吼風泥龍舞月何此打坐莫非觀音音聲起滅為根為塵根塵總非非總不是入是三昧觀音大士鳩摩負鐘鐘如是輕大士乘蓮蓮如是重輕重無性一切在心我苟無心蓮葉可乘中峰老人書於浮玉山精舍懷淨土詩明本東海一丸金彈子流光日日射西林世間多少奇男子誰向窗前惜寸陰迷時無悟悟無迷究竟迷時即悟時迷悟兩頭俱拽脫鑊湯元是藕花池四十八願水投水百千億身空合空法藏慈尊無面目不須重覓紫金容塵沙劫又塵沙劫數盡塵沙劫未休當念只因情未撇無邊生死自羈留四大聚成玄兔角六根縛住白龜毛漚花影裏翻䈥斗出沒閻浮是幾遭正念阿彌陀佛時寶池樹影日遲遲更馳心欲歸清泰又是重栽眼上眉濁水盡清殊有力亂心不動佛無機眼前盡是家鄉路不用逢人覓指歸萬劫死生如重病一聲浮號是良醫到頭藥病俱忘卻不用重宣母憶兒暗室中藏大黑蚖未曾驅盡莫耽眠髑髏壓碎須彌枕匝地香風綻白蓮藕池無日不花開四色光明映寶臺金臂遙伸垂念切衆生何事不思來故鄉易到路無差白日青天被物遮剔起兩莖眉自看火坑都是白蓮花獨坐幽齊萬慮逃一團山月上松梢不將迷悟遮心眼盡是眉閒白玉毫八功德水映金沙百寶樓臺散曉霞更有一般奇特事開敷紅藕大如車賀了新正看上元萬家銀燭照金蓮展開常寂光明土佛法何曾不現前示入泥洹記仲春風前歌舞恨波旬誰知自性黃金佛常供千花轉法輪寒食荒郊盡哭天有誰遙會老金仙劫初埋向蓮花土不要人來化紙錢初夏清和四月時九龍噴水沐嬰兒樂邦化主無生滅只把黃金鑄面皮不懸艾虎度端陽惟向西方古道場一炷爐薰一聲磬六門風遞藕花香清泰古家無六月從來火繖自張空金沙地上經行處陳陳吹來白藕香七月人家暑漸衰晚風池上正相宜遙看落日如懸鼓便策歸鞍已較遲登樓共賞中秋月回首誰思父母邦不問多生逃與逝至今垂念未相忘誰知九日東籬菊便是西方四色花一箇髑髏乾得盡百千聞見自無差人間十月盡開爐深撥寒灰問有無金色願王元是火能燒千劫愛河枯羣陰剝盡一陽來五葉心花當地開遍界枝條無著處香風吹上玉樓臺臘盡時窮事可憐東村王老夜燒錢即心自性彌陀佛滿面塵埃又一年一串素珠烏律律百千諸佛影團團循環淨念常相繼放去拈來總一般四蛇同篋險復險二鼠侵藤危更危不把蓮花栽淨域未知何劫是休時深思地獄發菩提父母家鄉勿再迷痛策歸鞭宜早到莫教直待日沈西要結蓮花會上緣是非人我盡傾捐無時不作難遭想歡喜同登解脫船念佛直須圖作佛不圖作佛念何為但當抱識含靈者白藕均同有一枝老來念佛正相當去日無多莫暫忘南無阿彌陀六字是名越苦海慈航諸苦盡從貪欲起不知貪欲起於何因忘自性彌陀佛異念紛馳總是魔勢至曾參日月光教令存相念西方自從親證三摩地不離慈尊左右傍觀經是一卷家書日落之方有故居多辦資財期早到免教慈父日嗟吁兄呼弟應念彌陀要與渾家出愛河辨得此心常與麼重教佛不奈伊何船往東西南北了依前不離古灘頭等閒推轉虛空拖香氣滿船花滿洲若不行船便任家從教門外拽三車笑看火宅深深處陸地純開水面花六方佛出廣長舌俱讚婆娑念佛人須信白蓮花世界無時不散劫壺春念佛不曾妨日用人於日用事相妨百年幻影誰能保莫負西天老願王富貴之人宜念佛黃金滿庫穀盈倉世間受用無虧缺只缺臨終見願王貧乏之人念佛時且無家事涉思維赤條條地空雙手直上蓮花占一枝盡道少年難念佛我云年少正相當看他七歲龍王女掌上神珠放寶光身膺宰輔與朝郎蓋世功名世莫量自性彌陀如不念未知何以敵無常心中有佛將心念念到心空佛亦忘撒手歸來重檢點花開紅白閒青黃清旦黃昏禮懺摩低頭泣告老彌陀輪回六趣知多少誓欲今番出網羅金沙地上無紅藕赤肉團中有至尊千聖頂𩕳移一步等間踢倒涅槃門念彌陀佛苦無難入聖超凡一指彈除卻彌陀存正念萬般聞見不相干現成公案絶商量曉磬頻敲蠟炬長晝夜六時聲不斷滿門風遞白蓮香動地驚天勤念佛捶門打戶勸修行問渠因甚麼如此只怕衆生入火坑便就今朝成佛去樂邦化主已嫌遲那堪更欲之乎者管取輪回沒了時禪外不曾談淨土須知淨土外無禪兩重公案都拈卻熊耳峰開五葉蓮佛與衆生夙有緣衆生與佛性無偏奈何甘受娑婆苦不肯回頭痛著鞭右懷淨土詩者中峰和上之所作也詩凡一百八首取素珠之一周也豫嘗為書其全稿今茲特取其要者再為書之憫羣生之迷塗道佛境之極樂及其成功一也大德五年春三月戊申弟子趙孟俯書與馮海粟居士明本曩辱下訪繼領詩章枯槁之縱過蒙提獎何以得此哉尋問閣下奉旨入覲而某亦理浮遊之棹走淮泝汳又復三年別來不識閣下於此道上能精加念力否今古利達之士靡不知三界是大夢宅苟不曾一回親切警悟則與此所知之心俱落夢寐故吾法中目之曰所知障是也此障鈍根人無分惟利達者有之故少林初祖只令人外絶諸緣內心無喘心如牆壁乃可入道肯將胸中解會底百千道理猛與截斷俾之如牆壁一回忽爾於牆壁處孔竇豁開千差萬別一以貫之曾何悟迷之有異同也或孔竇不即開豁但令久持而不忘縱使盡生不了當針芥相投於異世矣安有虛棄之理哉所以佛祖教人深信而不疑惟閣下於吾道信根未嘗不深獨未知其於信處能脫略所知否世間浮光幻影能幾何時向者鄙偈中有披衣終日坐茅室之句嘗蒙閣下許我以踐之今日所謂貧人索舊債也募修觀音閣疏虞淳熙伏以祇樹東來蔭三千之幻界圓根深入悟十二之契經念彼觀音了茲法界惟聖水落中峰之錫華鬘與舍利交輝其高殿容普陀之光海粟與文身相證是我普應指人普門攝龍宮五時五味之靈詮現蛤舍千手千眼之妙跡不眴而一珠自轉反聞而三寶互融豈屬思議直須捨離夫捨者六度之要津五燈之前焰截魔軍之利刃開惑障之金錍但修無量莊嚴不是有為功德啓善人卷荷之耳聽衲子化財之言今大衆雲居而大士露宿實所未忍以此希求況本老之偈頌如新又朴公之舊趾尚在因緣成事正在斯時喜捨為心願作是施或貽紙筆而裝赤軸或指纓珞而飾白衣或建應化之僧廬或製花冠之佛像總阿那娑羅言吉低輸為主更指三洲韋馱尊天者為盟錙鐵甚少一時而奉常住之三尊福德極多彈指而登不退之九品謹疏募修觀音閣偈并序黃汝亨雲居聖水禪寺元中峰和尚卓錫茲土冠郡名剎朴公嗣之為建大士殿閣房廊之勝遞新遞圮剝落松石見者慨然萬曆丁亥屬歲大旱直指蔡公按周禮荒政十二之一索神疏井而得磁相大士于前衛古井中相好妙莊嚴瑩淨如玉香鉢水盂涵八功德天降時雨百官有司暨億萬民踴躍稱頌菩薩大士錫祐山川奉之雲居禮拜供養朴公之業可紹而隆都閫王侯乃倡其事住僧照玄領之給部虞公長孺疏勸有衆惟忌與慳成功不易佛弟子黃汝亨稽首申讚而作偈言稽首大悲尊三十二圓應具足千手眼照覆諸十方十方暵晘苦如兒墮火坑又如身焦爛脂膏及汗血一切非我有化為清涼地現彼白玉相大火不能焦灑作一滴水而遍恆河沙是井非始有是佛非始來應此一念慈灌溉極無量我等浴佛恩如兒吸母乳報稱亦無量身命皆可捨而況金銀粟珠寶及旃檀持此一念心常呼觀自在念念相應結如空無退轉能消八難苦猶如火燒空中無寒熱故身心獲安樂是稱大慈悲是故應喜捨募修雲居聖水禪寺疏本山實懿雲巢竊惟梵宮煥彩實護國以垂庥淨域宏開堪祐民而護福茲雲居寺者地接吳山名高靈竺江濤湖影近在目前市雜人喧遠空腳底控離龍而作鎮聖水常資軒舞鳳以如翔文壇藉蔭溯自唐宋開基元明繼蹟東坡佛印秀結禪宗松雪中峰名高翰海雲每留而不去暝和松烟泉一滴之長流響分竹雨風飄旙影尊尊寶相莊嚴香裊爐烟箇箇名師駐錫鐘鼓上震乎太虛梵唄遙宣於天際詎意居諸屢易興廢殊觀崇樓傑閣之上無復凌虛修廊深院之中何能引勝梅花香裏惟留百詠清吟淨土碑前猶剩一雙麻履嵐氣兼霞氣以迷窗漏痕雜蝸痕而篆壁月穿梁隙棲鴒應驚風逼簷牙然燈將滅若不早扶衰桷印公之締造長湮惟當急整觚稜幻老之規模庶復實懿填海有心負山無力伏願貴官長者闔郡檀施籯金能布寶氣應騰笥帛肯捐剎光定現或楩南梱至足供梁桷之材或瓴甋輦來可備階垣之甃共成白業復湧青蓮從茲文運重興祝融永息異日龍旗南指或尋勝於茲山鸞輅東臨好拈香於是剎則不特名藍被寵且大為衆姓增輝矣贈無念說惟則雲居思菴主以無念字義質于豫豫謂無念有三怒雷震地山嶽驚泥牛之耳不掩白刃橫空鬼神泣木馬之晴不搖此頑冥之無念也萬仞崖頭撒手銅沙鑼裏盛油把定要津風高水急掃除行跡路絶門懸此坐斷攀緣之無念也一心不生萬法俱悉前後際斷生死情忘此心空之無念也如是三者子將何所居思曰不然吾一念之閒具含法界非心空也萬有交參羣機並赴非坐斷也木馬舞三臺泥牛鬬入海非頑冥也如月影之落江海淺深一無所擇如蓮花之出水泥垢淨二俱不著寂而常照作而不為以是為無念可乎豫亦豎拳示之復展手示之思罔措一笑而去
