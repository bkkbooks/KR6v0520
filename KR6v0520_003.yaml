body:
  text: 𧧌湛同明倫原輯通淵同實懿重纂題詠杭實名都人多好事每遇上九重三春秋佳日時選勝摛辭探幽餖韻或訪寂於優曇或興嗟於芃黍四方遊宦之客聞聲相思攜壺挈榼往往名篇秀句爭奇鬬麗於山水閒極古今之盛雲居近在南城逵衢車馬閒瞻之在望不必勞藤枝費屐齒興到即行攀躋尤便自髯翁畱題而後士大夫集中往往有遊集雲居之作今拾珠采翠都為一帙其他纂言記事咸附集焉志題詠雲居一山凡孤雲片石咸可登攀傑閣危亭頗資勝賞故臨風高詠或託興於長編倚樹微唫或寄情於短韻若挹雲烟於杖底髣髴如覿仙山搖星斗於筆端呼吸想通帝座皆能冥搜苦索探象罔於玄心獨立孤蹇破洪荒於赤手然此唱彼和語及他山者不收寄贈遠懷事關禪宗者方錄匪其言足重則其人可思序以時代為先後尚俟搜輯其闕略遊七寶山上方去年秋遊七寶山上方入小院閴然無人有一僧隱几低頭讀書與之語漠然不對問其鄰之僧曰此雲闍黎也不出山十五年矣今年六月自常潤還復至其室則死葬數月矣作詩題其壁云蘇軾雲師來寶山一住十五秋讀書常閉戶客至不舉頭去年造其室清坐忘百憂我初無言說師亦無對酬今年復扣門空房但颼颼云已滅無餘薪盡火不畱卻疑此室中常有此人否所遇孰非夢事過吾何求題雲居楊維楨廉夫赤日行天午不知老夫一榻號希夷兒童𨚗信松陰好又到西湖唱竹枝題雲居壁韓蘄王芒鞋竹杖是生涯老鬢今年玩物華為愛雲居松檜好不須更看牡丹花登雲居山張翥仲舉高處見滄溟西風吹酒醒潮來一片白山擁萬重青草木如浮動烟塵忽杳冥登臨不可極吟思滿秋汀題中峰國師望松圖釋克新邱隴青松天一涯兵戈千里未還家潮迴滄海鯨波險路入丹山鳥道賒心逐浮雲飛落日夢隨明月上孤槎野夫亦抱終天恨何處相期賦白華登雲居寺王鈍士魯吳山山上雲居寺脩竹長松畫不如佛閣倚天塵世遠僧窗畱月鏡臺虛淡烟翠靄或無有蒼狗白衣任卷舒孰謂無心出岫者也尋真境藉肩輿中陽劉鑄老樹團陰護隱居禪房深處會真如纖塵不染都成幻萬有難明總是虛裊裊爐烟香靄合娟娟山色翠屏舒欲追使相登臨賞媿我無因繼後輿會稽王子謙僧家樓閣倚雲居金剎諸天儼自如山繞四簷凝晚碧湖開一鏡蘸晴虛神龍護法天花散老衲焚香貝葉舒曾侍使君久登覽松風飛雨灑旗輿曾泰程介菴一半雲居半佛居雲籠佛像妙如如護巢鶴唳松杉暝送雨龍迴殿閣虛鐘鼓數聲禪後響幡幢一幅望中舒要知不是無心物歸路還須使者輿錢溥吳山頂上白雲居雲氣看來雪不如有意從龍渾欲化無心出岫本咸虛孤飛自喜隨風度五色還看捧日舒柏府使君今李白時來此地一停輿姚公綬相就閒雲蚤卜居雲連山徑畫中如簷牙墮影和松暝窗戶生雲過月虛地籟無聲秋正肅天池有趣曉還舒憶曾借臥衣裳冷約取重來喚竹輿石塘湖山勝概有雲居靄靄層層畫莫如蒼狗變形禪榻潤白衣散影梵宮虛從龍有意隨開合出岫無心任捲舒乘興登臨迷返路隔林山老引歸輿吳人韓雍永熙乘閒同謁梵王居滿眼風光畫不如四面好山淩碧落一窗脩竹稱清虛蘇公邱壑情偏放范老江湖心暫舒和罷陽春人盡醉不知身世在堪輿豫章郭子章青螺天迴七寶闢仙居幽徑風來興晏如直引湖光連塔潤豈應嶂影礙亭虛巖前風定青猿臥松頂雲開白鶴舒好是山靈護法界長懸紫氣慰扶輿湘東郝史正湖天一鏡照雲居點點晴峰烟自如高閣翠涵橫畫埡幽窗碧映湛清虛法輪欲共金輪轉慧日常同化日舒楚水吳山千里客忽驚雲外駐籃輿荊門胡作柄石圃紅塵不入此禪居居在雲中畫不如鐘磬陰陰幡幢潤松篁漠漠殿亭虛渾忘衣狗分常變誰識佛心日卷舒記取潢汙滯龍久九天春暖起扶輿朱樟鹿田閒雲寂寂護僧居寒碧遮門竹翳如行處長廊清似水望中雙鏡迥涵虛西歸剩對青絇在示現難逢紺髮舒白首重來成小劫憑誰初地問權輿張世犖妙峰無夜居士空山一榻近巢居悟得浮生電火如鶴夢青雲塵不到鴿王白業境仍虛雨餘早覺秋聲逼午夜還看倦眼舒快對南能評舊㡧臨風坐嘯小穹輿雲居畱詠德輿夏原吉維喆誰闢雲居境峨峨瞰石城湖光漾寒碧山色擁孤清經鎖千函妙鐘鳴萬戶聲此中真可樂何必訪蓬瀛誰闢雲居境依稀古化城獅柑霜過熟鳳竹雨餘清石悟禪中語鐘收飯後聲我來臨絕頂一覽小蓬瀛誰闢雲居境僧多居白雲晴窗清可采曉榻暖堪分曲引泉通水多栽松備薪山中如有社我亦寄閒身誰闢雲居境滿山多是雲淮揚千里隔吳越一江分僧獻有聲畫童炊帶雨薪寄言老幻住今換幾番身誰闢雲居境崎嶇一路遙青猊依佛座玄鶴近僧寮竹霧朝飛雨松風夜鼓濤中峰招不返老我在塵囂誰闢雲居境登臨不憚遙翠陰團竹徑金粉落松寮泉響窗前瑟峰排江上濤遠公知我否慎勿笑囂囂誰闢雲居境我來臨翠微江山吳越勝人物古今非東旭輝宸翰西風振客衣飄飄林下士宴坐話禪機誰闢雲居境僧閒心事微大顛真可友韓子豈宜非花落山藏錦雲來石有衣三車嘗自惜未解脫塵機重遊吳山雲居聖水風景為諸山最余少時從先人宦遊往來此中迄今四十餘年春王正月蒙恩巡視兩浙復一至寺山川雲物儼然如舊詢問故老凋逝八九有一二存焉不禁感歎因作詩云時宏治乙巳歲夏原吉雲居風景最稱奇今日登臨有所思浙水潺湲無異態湖山掩映似前時老僧能說先人政寶軸仍收上世詩嗟我重來多感慨懷親憶舊不勝悲遊雲居餘姚王守仁陽明拂袖風塵尚未能偷閒殊覺媿山僧杖藜終擬投三竺裘馬無勞說五陵長擬西湖放小舟看山隨意逐春流烟霞只作鷗鳧主斷卻紛紛世上愁雲居畱詠唐國秀蕭蕭一境入微茫翠竹蒼梧九夏涼幽鳥調聲歌絕壁閒雲畱影浸虛堂坐來頓覺囂塵遠別去懸知歲月忙自笑功名真幻物歸鞍欲上思徬徨畱題雲居金燦豐村飄揚豈肯甘肥遁是處青山即故岑未出岫時先有望便從龍去也無心輕拖化雨千山潤薄護驕陽四海除萬丈碧霄誇著足激昻今亦許藂林登雲居眺城南會稽徐渭文長夕照不曾殘城頭月正圓霞光翻鳥墮江色上松寒市客屠俱集高空醉屢看何妨高漸離抱卻筑來彈贈賓山上人馬三才松里慧遠歸藏地泉通靜惠林一從傳鉢後不盡築場心藝圃開三昧禪關破五陰問年八十上觀徧世間音春日贈靜山上人釋法聚玉芝巖居隨分得已悟是還非鳥聽談經下雲隨乞食歸病妨禪課減夢驗世緣稀別汝青春日書成木葉飛題山木堂釋戒言少林文室西巖下悠然興味長開門落峰影隱几映湖光宿雨浮空翠高陰拂地涼端居無外慕靜裏閱年芳匝地千章木參天半是松雲閒饒宴適地僻少過從夕影歸林鶴秋聲出塢鐘空臺終日靜坐對兩三峰贈雲棲山翁雲居不出山白雲日日護禪關松邊閱世長僧臘石畔開門生道顏殊有高情了歲月更無閒夢遊塵寰夕陽定起步西麓鶴帶秋陰湖上還晚由鐵冶嶺過雲居聖水寺歸安茅坤鹿門林度翠微曲城懸綠水隈綺羅倏雲隔仙梵入天來落日西陵樹孤烟帝子臺上方看不厭歸路絕塵埃予病後適逢初度奇上人為脩齋誦經賦詩謝云山僧憐我文園病共向峰頭禮釋迦四十九年迷苦海百千萬劫總河沙經聲西嶺通祇樹仙梵中天散覺花願乞世尊為弟子從教髠髮具袈裟訪仁山上人豐坊南禺三伏炎蒸草閣中不知秋到梵王宮倚窗亂竹來飛雨隔屋長松度遠風久坐暮雲時變白吟邊朝槿忽消紅經年多病妨行樂一叩禪關萬慮空題智公山房壁曹學佺能始山雲四繞多蒼翠山中還有雲居寺寺在雲關盡日幽一往彌令長禪思我聞尊者曰中峰經行多暇手栽松松葉松枝漬甘露一卷法華一株樹而今松樹長青青世人誰覓中峰路空門寧惜人代徂形勝居然恆不殊僧房各置巖仍谷半嶺時收江與湖湖水蕭蕭黯無色祇見寒波一片白冶遊誰復堤上子靜眺故有山中客客子來時不欲還真性能隨老衲閒歲除應是梅花裏日落徘徊松樹間漫復相逢歌白水由來生計在青山宿雲居李奎珠山一齋吟不出高卧白雲居萬竹維摩榻雙林大士廬詩禪超上乘水月證空虛為問西來意然燈話折蘆春日雨中過參黛樓借榻贈靜山上人李金庭山樓烟景少吟眺興偏幽花雨千峰暝松濤萬壑秋野情真自適仙境復何求孤嘯殘陽外蘼蕪綠滿洲碧嶂環虛閣藤蘿繞石闌雲光晴滴翠雨氣晝生寒地僻塵無染神清夢亦安睡酣江上月閒試小龍團獨坐雲深處翻憐世路非僧閒堪作侶景勝欲忘歸陽谷秋陰茂堂空燕雀稀鉤簾湖水碧閒看白鷗飛過雲居施璉川精舍岧嶤隔翠微我來便覺世情違孤燈照雨檐花落短鬢臨風木葉稀白雁虛凝千里信青山容得幾人歸詩成正在鐘鳴後獨坐空庭攬舊衣寓雲居山房顧青厓小閣開何許蒼雲秀水間幽尋曾屢過勝絕竟忘還石磴懸春雨柴牀落晚山高眠長不出信爾有真閒贈古松上人長洲王稺登百谷衝泥度嶺問僧家竹暗松深徑路斜一夜雨聲添碧草滿園春色鎖梅花禽言谷靜偏宜聽酒債山寒未肯賒頭白友郎能好客開廚畱客飯胡麻贈古松喬上人皇甫錫三乘翻貝葉四律吐靈花暫謝郎官省因探帝釋家赤烏論劫遠白舄渡江賒苦行將何事迷轉法華松樂亭晚眺呈賓山上人西安張大介少谷山晚雲烟合亭虛眺望通湖光斜枕海江色遠連空邂逅何年別攀登此日同不愁歸路暝畱宿有支公春日過迴崖禪房青春重欲半楊柳漸堪攀偶逐煙霞侶因過松竹間澄湖明夕照微雨暗春山終日嗟城市今朝喜暫閒與迴崖夜坐有懷吳兆投師知夙好幾夜坐深更煨芋山爐暖烹茶石澑清殘鐘度湖水落日半山城似覺諸緣靜懷君空復情雲居畱題徐春塘江上吳山生九峰峰迴客路是城中天開水鏡前江月坐接松濤絕壑風落木徑開宜舞鶴上方山曉自鳴鐘西湖只在危闌外引領秋光思不窮又閣倚層崖迥開窗對畫圖亂峰鳴夕照殘靄散秋湖客路依城轉松陰過雨無前江吟眺裏一鳥下平蕪同李笠翁沈因伯雲居話舊何玉振泗音人逐秋風至青山老客情竹深孤寺隱雁集一沙平古道埋荒草長江送遠聲登臨時把袂日落照孤城祝達方顧豹文談禪趺坐俯滄波白晝天花下薜蘿繞院菩提嵐翠重滿庭貝葉雨聲多春山振錫能降虎秋水揮毫不換鵝僧臘七旬空萬境人稱無著古維摩雲居寺贈風遠曹溶潔躬幽盡丹青出硿硿俯石林樹含樵斧寂晴湧佛香深伏竇泉宜釀吹松澗有琴不須問勝義早已薄懸金梵宮圍密靄不道是城中窟靜雲能照欄高地總空竹光畱宿雨鳥語出迴風更卜重陽後來看萬葉紅同楊香山葉林屋雲居西園竹閣贈心學上人偕尋竹閣寺西偏逸蹟相傳數百年人倦儘容嵓下住夏涼尤覺醉來便鼯鼪靄靄相忘地翡翠粼粼欲暮天莫悵黃塵銷未得暫分清晷學初禪從清屏山至雲居訪仁菴大師毛先舒稚黃翠微引步上虛空高下樓臺曲徑通紅葉遙分秋萬樹青山行過竹多叢雲生古壁將成雨日落長松更起風望裏白毫知不遠天花落處坐支公又雲居寺石徑幾里欹忽平峩然寶剎開西城天花貝葉總妙法禪室香臺非世情古碑喜畱片石語雙履誰踏空山聲身心漸覺塵累少將尋此地談無生雲居江望雲居絕頂俯寒空此日晴披雁背風一片江山秋色裏萬家烟樹夕陽中吟看太古雲凝白醉覺衰顏酒借紅不是春心勞目極那堪處處老丹楓登雲居訪心學大師并誌乍歸復別之意吳致一江湖空老去彈鋏暫歸來禪榻依然近香花特地開路從雲外遶山向座前迴獨恨飢驅客征帆已復誰過達方禪師園武