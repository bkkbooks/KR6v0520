住髓殷勤導脩廊瀟灑大半里豁耳南屏鐘照眼湖山起天開林態媚林霽鳥音喜盭厔不模糊湧現絇履底晶明青銅鏡重疊綠玉几天公愛詩人先令霉雨洗茶酣且夷猶吟足更徙倚歸攜詩稿看溼翠生袖裏戴廷熺鸝亭中峰瘞髮地樹翳雉堞環一角見湖尾晴翠羅羣山遠近互單複半鏡呈烟鬟片陰暗前岑度壑歸雲閒長廊久延佇齋廚破僧慳午景淨如拭坐對脩篁間新蟬忽曳響逸興不可刪日夕恣幽討相與忘疎頑施安竹田一峰立城陰黛色浮几上羣峰湖面來近遠疑相望積雨忽破陰快如埽殘瘴閒行就林樾頗亦便蕭爽路轉聞齋鐘淨居聊一訪經龕已成塵髮塔喜無恙蒼涼話枯禪牽率酬詩帳廊空放遠目妙處得新況風篁語不喧參差搖綠漲誰梳佛髻雲清淨見諸相我疑坳堂舟江湖落盆盎夙愛已云清愧無杜陵唱逃暑指後遊寬鞋獨來往吳城鷗亭黃梅浹旬雨洗盡蒼苔紋朝光盪絕壁嵐影搖風帬我來長廊立茗香散氤氳遙望湖上山積翠空中分天公若遲客冉冉飛涼雲研席削新句圖經懷舊聞譚禪苦不易愛山差足云何時結淨侶匄我旃檀薰流連當落景一舸招鷗羣戴樹元春曇結廬西城隅巖壑攬昕晏環湖雨後山新沐呈半面精藍接烟蘿拾級眾峰見密竹搖清風脩廊得勝選澹沲雲化嵐空明波若練積靄午漸消晴光眼微眩僧廚蔬筍供佛座巖花薦阿師舊跡畱瞻仰慨流轉香燈耿長明妙法傳一綫谷鳥遞飛鳴投林亦知倦淨慈明中大恒誰知入城遊仍在青巖畔寺右路轉幽竹樹影淩亂涼飇發長廊小立縱目看宿雨痕乍消四山烟忽斷湖波明滅中葑草出遠岸閒房納霽景飄瞥不容玩我本中峰裔藜牀安清盥翻經話宿因歲月悲漫漶吟罷理歸橈白鷗共蕭散實懿恭文新霽晚涼生野水亂鳴瀉薰風自南來披拂青藤架耆英來叩關忘形不須迓相引望林巒清談趁多暇湖分一角明烟忽四山卸照眼翠如洗參差露臺榭隱隱南屏鐘清韻落茅舍塵慮久蠲除恬吟樂無價鳴蟬曳斜暉深壑忘九夏慣伴閒雲眠看盡雲變化重九日過雲居訪雲巢上人王曾祥茨檐佳節肯輕負登臨藉短筇風聲隨澗遠樹影倚巖重碁侶舊同調茅齋足放慵羨師吟卷富早晚欲相從和雲巢大師雲居懷古韻西山聚星渭濱空居何處著塵埃雲外江城碧四迴奇石三台驚大米原泉一滴契黃梅青螺只許詩僧住白髮應隨筆塚堆飛錫自投天作意鶴歸松㠀漫哀哀黃葉秋山石逕斜獨憐城市絕紛華平湖水月三千頃撲地人烟百萬家疎雨綠垂江浦樹初陽紅映海天霞遙知登眺忘空闊直指恒河一點沙同友過雲居訪雲巢上人金志章江聲春山犖确路高低淺草茸茸翠欲齊古寺半荒藤覆瓦寒城斜抱石為梯湖先映檻浮空曲塔影橫窗隔竹西便擬與君歸淨業經龕禪板共幽棲陸文謨𦬊洲飛閣懸崖萬象低當門雉堞與堦齊長廊展步思遺舄仄逕層登悟法梯千嶂翠痕來硯北一湖水影接窗西曾聞看月稱名勝願借山房半夜棲柳溥郊原芳草望中低新綠還如翠黛齊遠瞰鯨波萬里舶平淩雉堞九霄梯斷碑落日橫苔上篠竹村莊在水西自問孤懷宜僻處忽嗤寥寂學卑棲雲居懷古實懿堞拱楓圍淨域開羣峰潑翠隔湖來山空蹟賸一雙履人去詩畱百首梅法席憑誰傳白業殘碑遺我撫青苔幢竿記取烟霞裏吟斷西風畫角哀脩廊獨倚暮烟稠境靜人閒豁遠眸雲氣黑含靈鷲雨濤聲怒捲廣陵秋泉流一滴源分細石記三台事最幽淨土牟尼陳迹在香臺翻誦不勝愁和徐州汪皋鶴立亭聖水高蹤雉堞開中峰禪悅昔參來塔明宮女奩中髮花放支公卷裏梅三佛香泉畱古井雙趺履蹟隱蒼苔王孫何處殘碑渺枯木寒鴉起暮哀精藍雲護眾峰稠楓嶺高頭一縱眸雞犬萬家城市遠風濤三折海門秋講堂畫壁烟霞古老佛塗金殿閣幽囘首湖山無限意與僧酬倡破閒愁又秋夕讀雲巢水明山樓集紅塵辭逐役緇侶覓交遊一卷碧靈集迴環卒未休禪心清似水詩律澹于秋風雨鐙窗黯能消旅客愁夏日同堇浦鹿田敬身訪雲巢上人分韻金志章逍遙散步折風廊癩可相逢話未央五字難靡詩壘破一甌聊試茗旗香燒猪韻事思前哲倦鳥歸心戀夕陽可許宗雷同入社還來消夏共清涼和實懿水鏡山屏護曲廊羣然連襼樂無央茶炊松子詩脾沁席遞荷風客韻香雲影忽來清酷暑溪聲不斷走斜陽相期共訂秋桐下重肯扶筇話夜涼晚入雲居寺魏之琇雲居寺前夕照曛落葉滿山秋不聞雲居寺裏無人迹蟲吟草底學詩客丹楓樹老銀杏肥長廊久立風吹衣五雲山頂快鶻落萬松嶺上寒鴉飛朦朧林際穿微月城郭炊烟生木末西湖涼影上闌干天與水雲同一闊題雲巢上人水明山樓集錢塘汪沆西顥柿園蒲室風流邈一卷清詞淨眼花誰道法門原不二枉教杜口學毘耶心香一瓣嗣中峰野鶴孤雲來去踪記得水明樓上坐交揮談麈折青松梵夾翻殘事藥王八功德水汲清涼此身苦器君知否好證聞思般若航贈雲巢上人陳士寅耑木竹閣松窗儘自由琴書堆案勝封侯名高十笏中丞舉德化諸山太守畱半夜潮回僧入定四更月吐客憑樓禪心詩骨清無敵風雅應推第一流師係維揚天甯寺法派韜跡雲居曾經大中丞莊公選僧迎鑾列入十大高僧中歲戊子太守嚴公復有都綱之薦前題吳江余易亭佛子兼才子風流最可人書聲通梵唄茶鼓出比鄰詩到無心妙交從物外真何時租小艇載鶴過南津行腳無多遠歸來懶興長禪心常少夢幽句忽生涼松雨袈裟潤荷風篛笠香為求蟬一飽沆𤅈每先嘗贈雲巢上人句吳王廷範澡雪靈臺牧慧光自提宗鏡砭膏肓花拈佛祖燈前案草別君臣肘後方支遁講堂標理窟遠公吟社富詩囊機鋒未接毘耶路曳杖何緣似宿桑西泠烟樹六橋東是處珠林客寓公坐借編蒲勞摸象誰能鑽紙類雕蟲青鞋布襪雲門與麗句清詞雪竇風竿木隨身參一指不須瓶缶餉虛空忘言自笑啞羊僧未會牛車最上乘粟粒漫藏千世界蒲團終老一龕燈刳腸何術從元化換骨誰人得少陵慚愧尺竿催進步石頭來路正淩競剎竿倒卻見門牆行腳腰包盡道場拂拭微塵光映徹破除熱惱髓清涼儘參初祖三年壁誰奉中峰一瓣香智藏不離文字海渡人應未倦津梁鳳凰山懷古張雨江左夷吾浪得名豫州英概亦沈溟夕陽枯木山如赭秋雨荒臺草自青漢苑玉魚誰復葬昭陵石馬亦無靈可憐白髮山人婦猶向燈前話後庭前題鄭江連騫鳳勢壓錢塘零落觚稜閃夕陽金殿淒涼春草合玉笙哀怨暮雲長江花似帶銅駝泣野麥如含寶鼎香禹井秦碑猶寂寞遺黎何必悼興亡前題金吰何堪劫換又紅羊壺塔安能鎮海疆徒有遺民悲趙宋旋聞焦士說准張軍聲歇絕誰貔虎山勢飛騰自鳳凰贏得蘭城江上宅城隅夏木鬱蒼蒼遊雲居寺朱輅千章喬木倚山城古剎雲深鎖碧崢拍几湖光浮曉夜橫軒江影變陰晴春風入閣飛桃瓣秋月臨樓落桂英但得心閒棲勝地著書何必論無生登雲居楓嶺絕頂魏麟徵眺盡湖山在此閒振衣塵外更超然香林遍是談經處卜筮方逢學易年道德五千人度谷琴聲六一客名泉登臨便覺浮雲小漫擬高峰不語禪首春雲居寺與賓三上人茶話朱樟鹿田味此曹溪一勺甘手揮如意且清談春來只有情難割老去都無佛可貪語帶烟霞供晚聽禪分賓主學同參舊遊禪指今如夢一夜梅花照碧潭海棠石壁歌同金江聲觀察作莫拭柳亭二月二日天氣佳春遊不惜幾緉履遺榮觀察性愛山雲居寺畔尋石壁我亦扶筇陪往探果見𤫩瓏雉堞側高脊藤蘿十丈牽瘦筋樹瓣千層坼中間竅穴更逶迤剔泥不用煩人力花萼天然肖海棠分明造物工雕刻僻在城隅人不知圖經缺載殊堪惜君不見南榷廢署石簇青芙蓉流傳遠自宋朝德壽宮今上省方邀賞鑒一朝拔出泥塗中從來顯晦有定數安見石壁終淪草莽無遭逢初春偕馬眉叔馬蘭若至雲居訪雲巢上人和前韻朱晉退谷靈區不忘豫章開一脈燈傳舊法臺佛印風流雲未散中峰禪悅錫飛來消閒拉友登林麓歡喜題詩踏蘚苔徙倚夕陽陳迹杳吟餘同試陸盧杯幻人幻相逝烟波春意春風長薜蘿襟袖香分梅冷澹杖藜溼惹翠婆娑山中靜極偷閒少世上愁偏入夢多恰值雲公蓮社啟二三知己得頻過前題馬芬蘭若我愛雲居靜登臨一縱眸湖山蘇白雅殿閣漢唐畱鳥語澁春冷花香戀客遊叩關吟侶在更上水明樓夙仰詩名重招邀入寺尋烹茶延舊雨挾冊頌新吟妙筆壽存歾清思繪古今浮生閒日少披對豁塵襟訪雲巢上人雲閒康梅春湖春遊頻到寺勝境似相招青滴千峰翠綠浮一葉蕉竹花生塔頂風雨隔山腰他日重來訪新詩定滿瓢瑞凝道院舊係雲居山房下剎也羽士居者久矣客歲辛卯仁邑高侯錢邑汪侯捐俸新之顏曰晶凝別墅負山面湖頗稱佳境今春抱膝松寮友人限屋北溪西成韻囑題興來學步貽辴壽陵定知不免也實懿晶凝新築山間屋鬬角鉤心供西北庀材不取化金鳩落成行見隨車鹿兩侯經濟流德輝孤衲登臨爽幽獨珠宮琳館許飛來白雲深處伴君宿翠壁丹崖望九溪腰包行腳任東西簷前栗樹竄松鼠檻外茶山聚竹雞平遠峰嵐青不斷參差林木綠將齊眼前不遇搜奇士辜負春鸝自在嗁鳩化金漢京兆長安張氏事鹿隨車後漢鄭宏事寺面城宋時有錢湖門與寺斜對元季堵塞中峰雲居菴記係趙子昂書廉希貢篆按中峰有繫念一卷詞偈頗精至今苕霅閒超度亡者用此蓮池仿之作雲棲施食文蓋宗此也載鳳翔精齋死節記係吏部郎中毛汝賢篆都綱良縉里人諸應麟本山住持性純真殊真良性歡海昌海性澄逸寂言海鈺海安性瑞法雨如滔如磨海倫真瑜真才真定本房海鎮照元通衢智喬性慈同立石沈衝雲居聖水禪寺重建殿記係無為州學正胡懋欽書邑人沈源篆僧道孜立石
